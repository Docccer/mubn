name: email-register
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps
      
      - name: Register Email
        run: |
          cat > register.js << 'JSEOF'
          const { chromium } = require('playwright');
          const crypto = require('crypto');
          const fs = require('fs');
          
          const rand = crypto.randomBytes(4).toString('hex');
          const username = `hxtest${rand}`;
          const password = 'HxTest2026!@#';
          
          console.log(`[*] Username: ${username}`);
          console.log(`[*] Password: ${password}`);
          
          (async () => {
              const browser = await chromium.launch({
                  headless: true,
                  args: ['--no-sandbox', '--disable-blink-features=AutomationControlled']
              });
              
              const context = await browser.newContext({
                  locale: 'en-US',
                  userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36'
              });
              
              const page = await context.newPage();
              
              await page.addInitScript(() => {
                  Object.defineProperty(navigator, 'webdriver', { get: () => false });
              });
              
              // Try ProtonMail first
              console.log('\n=== TRYING PROTONMAIL ===');
              try {
                  await page.goto('https://account.proton.me/signup', { 
                      waitUntil: 'domcontentloaded', 
                      timeout: 30000 
                  });
                  await page.waitForTimeout(8000);
                  
                  const title = await page.title();
                  console.log(`[*] Proton title: ${title}`);
                  
                  const bodyText = await page.evaluate(() => document.body.innerText.substring(0, 800));
                  console.log(`[*] Proton body: ${bodyText.substring(0, 500)}`);
                  
                  // Get all links and buttons
                  const links = await page.evaluate(() => {
                      return Array.from(document.querySelectorAll('a, button')).map(e => ({
                          tag: e.tagName,
                          text: e.innerText.trim().substring(0, 50),
                          href: e.href || '',
                          testid: e.getAttribute('data-testid') || ''
                      })).filter(e => e.text);
                  });
                  console.log(`[*] Links/Buttons: ${JSON.stringify(links.slice(0, 20), null, 2)}`);
                  
                  await page.screenshot({ path: 'proton1.png', fullPage: true });
                  
                  // Check for CAPTCHA
                  const captcha = await page.evaluate(() => {
                      const h = document.body.innerHTML.toLowerCase();
                      return {
                          recaptcha: h.includes('recaptcha'),
                          hcaptcha: h.includes('hcaptcha'),
                          captcha: h.includes('captcha'),
                          turnstile: h.includes('turnstile')
                      };
                  });
                  console.log(`[*] Proton CAPTCHA: ${JSON.stringify(captcha)}`);
                  
                  // Try to click "Free" plan
                  const freeLink = await page.$('a[href*="free"]') || 
                                   await page.$('button:has-text("Free")') ||
                                   await page.$('a:has-text("Free")');
                  
                  if (freeLink) {
                      console.log('[*] Clicking Free plan...');
                      await freeLink.click();
                      await page.waitForTimeout(5000);
                  }
                  
                  // Try to fill username
                  const emailInput = await page.$('#email') || 
                                     await page.$('input[name="email"]') ||
                                     await page.$('input[type="text"]');
                  
                  if (emailInput) {
                      console.log('[*] Filling username...');
                      await emailInput.fill(username);
                      await page.waitForTimeout(1000);
                      
                      // Look for "Next" or "Continue" button
                      const nextBtn = await page.$('button:has-text("Next")') ||
                                      await page.$('button:has-text("Continue")') ||
                                      await page.$('button[type="submit"]');
                      
                      if (nextBtn) {
                          console.log('[*] Clicking next...');
                          await nextBtn.click();
                          await page.waitForTimeout(5000);
                      }
                  }
                  
                  await page.screenshot({ path: 'proton2.png', fullPage: true });
                  
                  // Get updated page
                  const body2 = await page.evaluate(() => document.body.innerText.substring(0, 500));
                  console.log(`[*] Proton after step: ${body2.substring(0, 300)}`);
                  
                  // Check for password fields
                  const pwdFields = await page.$$('input[type="password"]');
                  console.log(`[*] Password fields: ${pwdFields.length}`);
                  
                  if (pwdFields.length >= 1) {
                      await pwdFields[0].fill(password);
                      if (pwdFields.length >= 2) {
                          await pwdFields[1].fill(password);
                      }
                      
                      // Submit
                      const submitBtn = await page.$('button[type="submit"]') ||
                                        await page.$('button:has-text("Create")');
                      
                      if (submitBtn) {
                          console.log('[*] Submitting...');
                          await submitBtn.click();
                          await page.waitForTimeout(10000);
                          
                          const finalTitle = await page.title();
                          const finalBody = await page.evaluate(() => document.body.innerText.substring(0, 500));
                          console.log(`[*] After submit - Title: ${finalTitle}`);
                          console.log(`[*] After submit - Body: ${finalBody}`);
                          
                          await page.screenshot({ path: 'proton3.png', fullPage: true });
                      }
                  }
                  
                  // Check for verification/captcha
                  const verifyCheck = await page.evaluate(() => {
                      const h = document.body.innerHTML.toLowerCase();
                      const t = document.body.innerText;
                      return {
                          captcha: h.includes('captcha'),
                          phone: t.includes('phone') || t.includes('mobile'),
                          recovery: t.includes('recovery'),
                          verify: t.includes('verify') || t.includes('verification')
                      };
                  });
                  console.log(`[*] Verification check: ${JSON.stringify(verifyCheck)}`);
                  
              } catch(e) {
                  console.log(`[-] ProtonMail failed: ${e.message}`);
              }
              
              // Try Yandex
              console.log('\n=== TRYING YANDEX ===');
              try {
                  await page.goto('https://passport.yandex.com/registration', {
                      waitUntil: 'domcontentloaded',
                      timeout: 30000
                  });
                  await page.waitForTimeout(5000);
                  
                  const title = await page.title();
                  console.log(`[*] Yandex title: ${title}`);
                  
                  const bodyText = await page.evaluate(() => document.body.innerText.substring(0, 500));
                  console.log(`[*] Yandex body: ${bodyText.substring(0, 300)}`);
                  
                  await page.screenshot({ path: 'yandex1.png', fullPage: true });
                  
                  // Check for CAPTCHA
                  const captcha = await page.evaluate(() => {
                      const h = document.body.innerHTML.toLowerCase();
                      return {
                          smartcaptcha: h.includes('smartcaptcha'),
                          recaptcha: h.includes('recaptcha'),
                          hcaptcha: h.includes('hcaptcha'),
                          captcha: h.includes('captcha')
                      };
                  });
                  console.log(`[*] Yandex CAPTCHA: ${JSON.stringify(captcha)}`);
                  
                  // Fill form
                  const loginInput = await page.$('#login') || 
                                     await page.$('input[name="login"]');
                  
                  if (loginInput) {
                      await loginInput.fill(username);
                      await page.waitForTimeout(1000);
                  }
                  
                  const pwdInput = await page.$('#password') || 
                                   await page.$('input[name="password"]');
                  
                  if (pwdInput) {
                      await pwdInput.fill(password);
                      await page.waitForTimeout(1000);
                  }
                  
                  const pwdConfirm = await page.$('#password_confirm') || 
                                     await page.$('input[name="password_confirm"]');
                  
                  if (pwdConfirm) {
                      await pwdConfirm.fill(password);
                      await page.waitForTimeout(1000);
                  }
                  
                  // Fill name fields
                  const fnInput = await page.$('#firstname') || 
                                  await page.$('input[name="firstname"]');
                  if (fnInput) await fnInput.fill('Test');
                  
                  const lnInput = await page.$('#lastname') || 
                                  await page.$('input[name="lastname"]');
                  if (lnInput) await lnInput.fill('User');
                  
                  await page.screenshot({ path: 'yandex2.png', fullPage: true });
                  
                  // Try to submit
                  const submitBtn = await page.$('button[type="submit"]') ||
                                    await page.$('button:has-text("Register")');
                  
                  if (submitBtn) {
                      console.log('[*] Submitting Yandex...');
                      await submitBtn.click();
                      await page.waitForTimeout(10000);
                      
                      const finalTitle = await page.title();
                      const finalBody = await page.evaluate(() => document.body.innerText.substring(0, 500));
                      console.log(`[*] Yandex after submit - Title: ${finalTitle}`);
                      console.log(`[*] Yandex after submit - Body: ${finalBody}`);
                      
                      await page.screenshot({ path: 'yandex3.png', fullPage: true });
                      
                      // Check verification
                      const verifyCheck = await page.evaluate(() => {
                          const h = document.body.innerHTML.toLowerCase();
                          const t = document.body.innerText;
                          return {
                              captcha: h.includes('captcha'),
                              phone: t.includes('phone') || t.includes('mobile') || t.includes('SMS'),
                              success: t.includes('successfully') || t.includes('welcome')
                          };
                      });
                      console.log(`[*] Yandex verification: ${JSON.stringify(verifyCheck)}`);
                  }
                  
              } catch(e) {
                  console.log(`[-] Yandex failed: ${e.message}`);
              }
              
              // Try Mail.ru
              console.log('\n=== TRYING MAIL.RU ===');
              try {
                  await page.goto('https://account.mail.ru/signup', {
                      waitUntil: 'domcontentloaded',
                      timeout: 30000
                  });
                  await page.waitForTimeout(5000);
                  
                  const title = await page.title();
                  console.log(`[*] Mail.ru title: ${title}`);
                  
                  const bodyText = await page.evaluate(() => document.body.innerText.substring(0, 500));
                  console.log(`[*] Mail.ru body: ${bodyText.substring(0, 300)}`);
                  
                  await page.screenshot({ path: 'mailru1.png', fullPage: true });
                  
                  // Check for CAPTCHA
                  const captcha = await page.evaluate(() => {
                      const h = document.body.innerHTML.toLowerCase();
                      return {
                          smartcaptcha: h.includes('smartcaptcha'),
                          recaptcha: h.includes('recaptcha'),
                          captcha: h.includes('captcha')
                      };
                  });
                  console.log(`[*] Mail.ru CAPTCHA: ${JSON.stringify(captcha)}`);
                  
              } catch(e) {
                  console.log(`[-] Mail.ru failed: ${e.message}`);
              }
              
              console.log('\n=== DONE ===');
              console.log(`Credentials: ${username} / ${password}`);
              
              await browser.close();
          })().catch(e => {
              console.error('[-] Fatal:', e.message);
              process.exit(1);
          });
          JSEOF
          node register.js
      
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: email-screenshots
          path: '*.png'
          retention-days: 1
