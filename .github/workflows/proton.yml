name: proton-v4
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps
      
      - name: Register ProtonMail
        run: |
          cat > register.js << 'JSEOF'
          const { chromium } = require('playwright');
          const crypto = require('crypto');
          
          const rand = crypto.randomBytes(4).toString('hex');
          const username = `hxtest${rand}`;
          const password = 'HxTest2026!@#';
          
          console.log(`[*] Username: ${username}@proton.me`);
          console.log(`[*] Password: ${password}`);
          
          (async () => {
              const browser = await chromium.launch({
                  headless: true,
                  args: ['--no-sandbox', '--disable-blink-features=AutomationControlled']
              });
              
              const context = await browser.newContext({
                  locale: 'en-US',
                  userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36'
              });
              
              const page = await context.newPage();
              
              await page.addInitScript(() => {
                  Object.defineProperty(navigator, 'webdriver', { get: () => false });
              });
              
              // Navigate directly with plan=free parameter
              console.log('[*] Navigating to ProtonMail signup...');
              await page.goto('https://account.proton.me/signup?plan=free', { 
                  waitUntil: 'domcontentloaded', 
                  timeout: 30000 
              });
              await page.waitForTimeout(10000);
              
              let title = await page.title();
              console.log(`[*] Title: ${title}`);
              console.log(`[*] URL: ${page.url()}`);
              
              // Screenshot
              await page.screenshot({ path: 'step1.png', fullPage: true });
              
              // Get all inputs with their full attributes
              const allInputs = await page.evaluate(() => {
                  return Array.from(document.querySelectorAll('input')).map(i => ({
                      id: i.id,
                      name: i.name,
                      type: i.type,
                      placeholder: i.placeholder,
                      testid: i.getAttribute('data-testid'),
                      ariaLabel: i.getAttribute('aria-label'),
                      className: i.className.substring(0, 60),
                      value: i.value,
                      visible: i.offsetParent !== null
                  }));
              });
              console.log(`[*] All inputs: ${JSON.stringify(allInputs, null, 2)}`);
              
              // Use data-testid to find the input elements
              // ProtonMail uses testid="input-input-element" for form inputs
              const inputElements = await page.$$('[data-testid="input-input-element"]');
              console.log(`[*] Found ${inputElements.length} input-input-element elements`);
              
              // The first one should be email/username, second should be password
              if (inputElements.length >= 2) {
                  console.log('[*] Filling email/username...');
                  await inputElements[0].click();
                  await inputElements[0].fill(username);
                  await page.waitForTimeout(500);
                  
                  console.log('[*] Filling password...');
                  await inputElements[1].click();
                  await inputElements[1].fill(password);
                  await page.waitForTimeout(500);
                  
                  // Check for repeat password field
                  if (inputElements.length >= 3) {
                      console.log('[*] Filling repeat password...');
                      await inputElements[2].click();
                      await inputElements[2].fill(password);
                      await page.waitForTimeout(500);
                  }
              } else if (inputElements.length === 1) {
                  // Might be just password - try filling it
                  console.log('[*] Only 1 input found, trying as password...');
                  await inputElements[0].fill(password);
              }
              
              await page.screenshot({ path: 'step2.png', fullPage: true });
              
              // Look for submit button
              const submitBtn = await page.$('button[data-testid="submit-button"]') ||
                                await page.$('button[type="submit"]') ||
                                await page.$('button:has-text("Start using")') ||
                                await page.$('button:has-text("Create")') ||
                                await page.$('button:has-text("Next")') ||
                                await page.$('button:has-text("Sign up")');
              
              if (submitBtn) {
                  const btnText = await submitBtn.innerText();
                  console.log(`[*] Submit button: "${btnText}"`);
                  await submitBtn.click();
                  console.log('[*] Clicked submit');
                  await page.waitForTimeout(10000);
              } else {
                  console.log('[!] No submit button found');
                  
                  // Get all buttons
                  const btns = await page.evaluate(() => {
                      return Array.from(document.querySelectorAll('button')).map(b => ({
                          text: b.innerText.trim().substring(0, 50),
                          testid: b.getAttribute('data-testid'),
                          type: b.type
                      }));
                  });
                  console.log(`[*] All buttons: ${JSON.stringify(btns, null, 2)}`);
              }
              
              // Check result
              title = await page.title();
              const url = page.url();
              const body = await page.evaluate(() => document.body.innerText.substring(0, 500));
              console.log(`[*] After submit - Title: ${title}`);
              console.log(`[*] After submit - URL: ${url}`);
              console.log(`[*] After submit - Body: ${body}`);
              
              await page.screenshot({ path: 'step3.png', fullPage: true });
              
              // Check for verification steps
              const verifyInfo = await page.evaluate(() => {
                  const t = document.body.innerText;
                  const h = document.body.innerHTML.toLowerCase();
                  return {
                      phone: t.includes('phone') || t.includes('Phone') || t.includes('mobile'),
                      captcha: h.includes('captcha'),
                      recovery: t.includes('recovery') || t.includes('Recovery'),
                      verify: t.includes('verify') || t.includes('Verify'),
                      success: t.includes('Inbox') || t.includes('Welcome'),
                      sms: t.includes('SMS') || t.includes('sms'),
                      recoveryEmail: t.includes('recovery email')
                  };
              });
              console.log(`[*] Verification: ${JSON.stringify(verifyInfo)}`);
              
              // Handle verification
              if (verifyInfo.phone || verifyInfo.sms) {
                  console.log('[!] Phone/SMS verification required');
                  // Try to skip
                  const skipBtn = await page.$('button:has-text("Skip")') ||
                                  await page.$('a:has-text("Skip")') ||
                                  await page.$('[data-testid="skip-button"]');
                  if (skipBtn) {
                      console.log('[*] Clicking Skip...');
                      await skipBtn.click();
                      await page.waitForTimeout(5000);
                  }
              }
              
              if (verifyInfo.recovery) {
                  console.log('[!] Recovery email step');
                  const skipBtn = await page.$('button:has-text("Skip")') ||
                                  await page.$('a:has-text("Skip")');
                  if (skipBtn) {
                      await skipBtn.click();
                      await page.waitForTimeout(5000);
                  }
              }
              
              // Final state
              title = await page.title();
              const finalBody = await page.evaluate(() => document.body.innerText.substring(0, 500));
              console.log(`\n=== FINAL ===`);
              console.log(`Title: ${title}`);
              console.log(`URL: ${page.url()}`);
              console.log(`Body: ${finalBody}`);
              console.log(`\n=== CREDENTIALS ===`);
              console.log(`Email: ${username}@proton.me`);
              console.log(`Password: ${password}`);
              
              await page.screenshot({ path: 'final.png', fullPage: true });
              
              await browser.close();
          })().catch(e => {
              console.error('[-] Fatal:', e.message);
              process.exit(1);
          });
          JSEOF
          node register.js
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proton-v4
          path: '*.png'
          retention-days: 1
