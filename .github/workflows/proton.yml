name: proton-v3
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps
      
      - name: Register ProtonMail
        run: |
          cat > register.js << 'JSEOF'
          const { chromium } = require('playwright');
          const crypto = require('crypto');
          const fs = require('fs');
          
          const rand = crypto.randomBytes(4).toString('hex');
          const username = `hxtest${rand}`;
          const password = 'HxTest2026!@#';
          
          console.log(`[*] Username: ${username}@proton.me`);
          console.log(`[*] Password: ${password}`);
          
          (async () => {
              const browser = await chromium.launch({
                  headless: true,
                  args: ['--no-sandbox', '--disable-blink-features=AutomationControlled']
              });
              
              const context = await browser.newContext({
                  locale: 'en-US',
                  userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36'
              });
              
              const page = await context.newPage();
              
              await page.addInitScript(() => {
                  Object.defineProperty(navigator, 'webdriver', { get: () => false });
              });
              
              // Navigate to signup
              console.log('[*] Navigating to ProtonMail signup...');
              await page.goto('https://account.proton.me/signup', { 
                  waitUntil: 'domcontentloaded', 
                  timeout: 30000 
              });
              await page.waitForTimeout(8000);
              
              let title = await page.title();
              console.log(`[*] Title: ${title}`);
              console.log(`[*] URL: ${page.url()}`);
              
              // Get all elements with data-testid
              const testIds = await page.evaluate(() => {
                  return Array.from(document.querySelectorAll('[data-testid]')).map(e => ({
                      tag: e.tagName,
                      testid: e.getAttribute('data-testid'),
                      text: e.innerText.trim().substring(0, 60),
                      href: e.href || ''
                  }));
              });
              console.log(`[*] data-testid elements: ${JSON.stringify(testIds, null, 2)}`);
              
              // Look for the Free plan button more carefully
              // The text includes "Free\nUS$0\n..."
              const freeBtn = await page.locator('[data-testid*="free"], [data-testid*="Free"]').first();
              
              if (await freeBtn.count() > 0) {
                  console.log('[*] Found Free plan by testid, clicking...');
                  await freeBtn.click();
              } else {
                  // Try finding by text content
                  const allBtns = await page.$$('button, a');
                  for (const btn of allBtns) {
                      const text = await btn.innerText().catch(() => '');
                      if (text.startsWith('Free') && text.includes('US$0')) {
                          console.log('[*] Found Free plan by text, clicking...');
                          await btn.click();
                          break;
                      }
                  }
              }
              
              // Wait for navigation or form to appear
              await page.waitForTimeout(5000);
              
              title = await page.title();
              console.log(`[*] After Free click - Title: ${title}`);
              console.log(`[*] After Free click - URL: ${page.url()}`);
              
              // Check for any new inputs
              const inputs1 = await page.evaluate(() => {
                  return Array.from(document.querySelectorAll('input')).map(i => ({
                      id: i.id, name: i.name, type: i.type,
                      placeholder: i.placeholder,
                      ariaLabel: i.getAttribute('aria-label'),
                      visible: i.offsetParent !== null
                  }));
              });
              console.log(`[*] Inputs after Free: ${JSON.stringify(inputs1, null, 2)}`);
              
              await page.screenshot({ path: 'step1.png', fullPage: true });
              
              // If we're still on the pricing page, try navigating directly to the signup form
              if (page.url().includes('/signup') && inputs1.length === 0) {
                  console.log('[*] Still on pricing page. Trying direct signup URL...');
                  
                  // Try different signup URLs
                  const urls = [
                      'https://account.proton.me/signup?plan=free',
                      'https://account.proton.me/signup?product=mail&plan=free',
                      'https://account.proton.me/mail/signup/free',
                      'https://account.proton.me/signup?lang=en'
                  ];
                  
                  for (const url of urls) {
                      console.log(`[*] Trying: ${url}`);
                      await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 15000 });
                      await page.waitForTimeout(3000);
                      
                      const newInputs = await page.evaluate(() => {
                          return Array.from(document.querySelectorAll('input')).map(i => ({
                              id: i.id, type: i.type, placeholder: i.placeholder
                          }));
                      });
                      
                      if (newInputs.length > 0) {
                          console.log(`[*] Found ${newInputs.length} inputs at ${url}`);
                          console.log(`[*] Inputs: ${JSON.stringify(newInputs)}`);
                          break;
                      }
                  }
              }
              
              // Now try to find and fill the signup form
              // ProtonMail might have a multi-step form
              
              // Step 1: Look for email/username input
              const emailInput = await page.$('#email') || 
                                 await page.$('input[name="email"]') ||
                                 await page.$('input[id*="email"]') ||
                                 await page.$('input[aria-label*="email" i]') ||
                                 await page.$('input[aria-label*="user" i]') ||
                                 await page.$('input[type="text"]');
              
              if (emailInput) {
                  const inputInfo = await emailInput.evaluate(e => ({
                      id: e.id, type: e.type, placeholder: e.placeholder,
                      ariaLabel: e.getAttribute('aria-label')
                  }));
                  console.log(`[*] Found email input: ${JSON.stringify(inputInfo)}`);
                  await emailInput.fill(username);
                  console.log('[*] Username filled');
              } else {
                  console.log('[!] No email input found');
                  
                  // Dump the full page HTML for analysis
                  const html = await page.content();
                  fs.writeFileSync('page.html', html);
                  console.log(`[*] Page HTML saved (${html.length} bytes)`);
                  
                  // Get all form elements
                  const formEls = await page.evaluate(() => {
                      return Array.from(document.querySelectorAll('form, fieldset, [role="form"]')).map(f => ({
                          tag: f.tagName,
                          id: f.id,
                          action: f.action || '',
                          inputs: Array.from(f.querySelectorAll('input')).length
                      }));
                  });
                  console.log(`[*] Form elements: ${JSON.stringify(formEls)}`);
              }
              
              // Step 2: Look for password field
              const pwdInput = await page.$('#password') ||
                               await page.$('input[type="password"]');
              
              if (pwdInput) {
                  await pwdInput.fill(password);
                  console.log('[*] Password filled');
              }
              
              // Step 3: Look for repeat password
              const pwdInputs = await page.$$('input[type="password"]');
              if (pwdInputs.length >= 2) {
                  await pwdInputs[1].fill(password);
                  console.log('[*] Repeat password filled');
              }
              
              // Step 4: Submit
              const submitBtn = await page.$('button[type="submit"]') ||
                                await page.$('button:has-text("Create")') ||
                                await page.$('button:has-text("Next")') ||
                                await page.$('button:has-text("Sign up")');
              
              if (submitBtn) {
                  const btnText = await submitBtn.innerText();
                  console.log(`[*] Found submit button: "${btnText}", clicking...`);
                  await submitBtn.click();
                  await page.waitForTimeout(8000);
                  
                  title = await page.title();
                  console.log(`[*] After submit - Title: ${title}`);
                  console.log(`[*] After submit - URL: ${page.url()}`);
                  
                  const bodyText = await page.evaluate(() => document.body.innerText.substring(0, 500));
                  console.log(`[*] After submit - Body: ${bodyText}`);
                  
                  await page.screenshot({ path: 'step2.png', fullPage: true });
                  
                  // Check what verification is needed
                  const verifyInfo = await page.evaluate(() => {
                      const t = document.body.innerText;
                      return {
                          phone: t.includes('phone') || t.includes('Phone') || t.includes('mobile'),
                          captcha: t.includes('captcha') || t.includes('CAPTCHA'),
                          recovery: t.includes('recovery') || t.includes('Recovery'),
                          verify: t.includes('verify') || t.includes('Verify'),
                          success: t.includes('success') || t.includes('Welcome') || t.includes('Inbox')
                      };
                  });
                  console.log(`[*] Verification needed: ${JSON.stringify(verifyInfo)}`);
                  
                  // If phone verification, we need to handle it
                  if (verifyInfo.phone) {
                      console.log('[!] Phone verification required');
                      
                      // Check for "Skip" option
                      const skipBtn = await page.$('button:has-text("Skip")') ||
                                      await page.$('a:has-text("Skip")');
                      if (skipBtn) {
                          console.log('[*] Found Skip button, clicking...');
                          await skipBtn.click();
                          await page.waitForTimeout(5000);
                      }
                  }
                  
                  // If recovery email, try to skip
                  if (verifyInfo.recovery) {
                      const skipBtn = await page.$('button:has-text("Skip")') ||
                                      await page.$('a:has-text("Skip")');
                      if (skipBtn) {
                          console.log('[*] Skipping recovery...');
                          await skipBtn.click();
                          await page.waitForTimeout(5000);
                      }
                  }
              }
              
              // Final state
              title = await page.title();
              const finalBody = await page.evaluate(() => document.body.innerText.substring(0, 500));
              console.log(`\n=== FINAL STATE ===`);
              console.log(`Title: ${title}`);
              console.log(`URL: ${page.url()}`);
              console.log(`Body: ${finalBody}`);
              console.log(`\n=== CREDENTIALS ===`);
              console.log(`Email: ${username}@proton.me`);
              console.log(`Password: ${password}`);
              
              await page.screenshot({ path: 'final.png', fullPage: true });
              
              await browser.close();
          })().catch(e => {
              console.error('[-] Fatal:', e.message);
              process.exit(1);
          });
          JSEOF
          node register.js
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proton-results
          path: |
            *.png
            *.html
          retention-days: 1
