name: proton-v9
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps
      
      - name: Register ProtonMail
        run: |
          cat > register.js << 'JSEOF'
          const { chromium } = require('playwright');
          const crypto = require('crypto');
          
          const rand = crypto.randomBytes(4).toString('hex');
          const username = `hxtest${rand}`;
          const password = 'HxTest2026!@#';
          
          console.log('[*] Username: ' + username + '@proton.me');
          console.log('[*] Password: ' + password);
          
          (async () => {
              const browser = await chromium.launch({
                  headless: true,
                  args: ['--no-sandbox', '--disable-blink-features=AutomationControlled']
              });
              
              const context = await browser.newContext({
                  locale: 'en-US',
                  userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36'
              });
              
              const page = await context.newPage();
              
              await page.addInitScript(() => {
                  Object.defineProperty(navigator, 'webdriver', { get: () => false });
              });
              
              console.log('[*] Navigating...');
              await page.goto('https://account.proton.me/signup?plan=free', { 
                  waitUntil: 'domcontentloaded', 
                  timeout: 30000 
              });
              await page.waitForTimeout(12000);
              
              console.log('[*] Title: ' + await page.title());
              await page.screenshot({ path: 'step1.png', fullPage: true });
              
              // Check inputs
              const inputs = await page.evaluate(() => {
                  return Array.from(document.querySelectorAll('input')).map(i => ({
                      id: i.id, type: i.type, visible: i.offsetParent !== null
                  }));
              });
              console.log('[*] Inputs: ' + JSON.stringify(inputs));
              
              // Approach: click on the input element, then pressSequentially
              const userLoc = page.locator('#username');
              const pwdLoc = page.locator('#password');
              
              // Click username field and type
              console.log('[*] Clicking username field...');
              await userLoc.click({ timeout: 10000 });
              await page.waitForTimeout(300);
              
              // Clear and type character by character
              await page.keyboard.press('Control+a');
              await page.keyboard.press('Backspace');
              await page.waitForTimeout(200);
              
              console.log('[*] Typing username...');
              await page.keyboard.type(username, { delay: 100 });
              await page.waitForTimeout(500);
              
              // Check value immediately
              let userVal = await userLoc.inputValue();
              console.log('[*] Username after type: "' + userVal + '"');
              
              // If empty, try pressSequentially on the locator
              if (!userVal) {
                  console.log('[*] Empty! Trying pressSequentially on locator...');
                  await userLoc.click();
                  await page.waitForTimeout(200);
                  await userLoc.pressSequentially(username, { delay: 100 });
                  await page.waitForTimeout(500);
                  userVal = await userLoc.inputValue();
                  console.log('[*] Username after pressSequentially: "' + userVal + '"');
              }
              
              // If still empty, try fill with dispatchEvent
              if (!userVal) {
                  console.log('[*] Still empty! Trying fill + dispatchEvent...');
                  await userLoc.fill(username);
                  // Immediately dispatch React-compatible events
                  await page.evaluate(() => {
                      const el = document.getElementById('username');
                      if (el) {
                          const nativeInputValueSetter = Object.getOwnPropertyDescriptor(
                              window.HTMLInputElement.prototype, 'value'
                          ).set;
                          nativeInputValueSetter.call(el, el.value);
                          el.dispatchEvent(new Event('input', { bubbles: true }));
                          el.dispatchEvent(new Event('change', { bubbles: true }));
                      }
                  });
                  await page.waitForTimeout(500);
                  userVal = await userLoc.inputValue();
                  console.log('[*] Username after native setter: "' + userVal + '"');
              }
              
              // If STILL empty, try triple-click to select all + type
              if (!userVal) {
                  console.log('[*] STILL empty! Trying triple-click + type...');
                  await userLoc.click({ clickCount: 3 });
                  await page.waitForTimeout(200);
                  await page.keyboard.type(username, { delay: 80 });
                  await page.waitForTimeout(500);
                  userVal = await userLoc.inputValue();
                  console.log('[*] Username after triple-click: "' + userVal + '"');
              }
              
              // Fill password
              await pwdLoc.click({ timeout: 10000 });
              await page.keyboard.type(password, { delay: 80 });
              console.log('[*] Password typed');
              
              // Check for repeat password
              const pwdCount = await page.locator('input[type="password"]').count();
              if (pwdCount >= 2) {
                  console.log('[*] Filling repeat password...');
                  await page.locator('input[type="password"]').nth(1).click();
                  await page.keyboard.type(password, { delay: 80 });
              }
              
              // Final form state
              const formState = await page.evaluate(() => ({
                  user: document.getElementById('username')?.value || '',
                  pwd: document.getElementById('password')?.value?.length || 0
              }));
              console.log('[*] Final form state: user="' + formState.user + '", pwd_len=' + formState.pwd);
              
              await page.screenshot({ path: 'step2.png', fullPage: true });
              
              // Click submit
              const clicked = await page.evaluate(() => {
                  const btns = Array.from(document.querySelectorAll('button'));
                  for (const btn of btns) {
                      const text = btn.innerText.trim().toLowerCase();
                      if (text.includes('start using') || text.includes('create') || text.includes('sign up')) {
                          btn.click(); return btn.innerText.trim();
                      }
                  }
                  return null;
              });
              console.log('[*] Clicked: ' + clicked);
              
              await page.waitForTimeout(10000);
              
              console.log('[*] After submit - Title: ' + await page.title());
              console.log('[*] After submit - URL: ' + page.url());
              const body = await page.evaluate(() => document.body.innerText.substring(0, 800));
              console.log('[*] Body: ' + body);
              
              await page.screenshot({ path: 'step3.png', fullPage: true });
              
              // Check verification
              const verify = await page.evaluate(() => {
                  const t = document.body.innerText;
                  const h = document.body.innerHTML.toLowerCase();
                  return {
                      phone: t.includes('phone') || t.includes('Phone'),
                      captcha: h.includes('captcha') || h.includes('recaptcha'),
                      recovery: t.includes('recovery'),
                      success: t.includes('Inbox') || t.includes('Welcome')
                  };
              });
              console.log('[*] Verification: ' + JSON.stringify(verify));
              
              // Skip steps
              for (let s = 0; s < 5; s++) {
                  const skipped = await page.evaluate(() => {
                      const btns = Array.from(document.querySelectorAll('button, a'));
                      for (const btn of btns) {
                          const text = btn.innerText.trim().toLowerCase();
                          if (text === 'skip' || text === 'skip for now' || text === 'maybe later') {
                              btn.click(); return btn.innerText.trim();
                          }
                      }
                      return null;
                  });
                  if (skipped) { console.log('[*] Skipped: ' + skipped); await page.waitForTimeout(5000); }
                  else break;
              }
              
              // Final
              console.log('\n=== FINAL ===');
              console.log('Title: ' + await page.title());
              console.log('URL: ' + page.url());
              console.log('Body: ' + await page.evaluate(() => document.body.innerText.substring(0, 500)));
              console.log('\n=== CREDENTIALS ===');
              console.log('Email: ' + username + '@proton.me');
              console.log('Password: ' + password);
              
              await page.screenshot({ path: 'final.png', fullPage: true });
              await browser.close();
          })().catch(e => { console.error('[-] Fatal: ' + e.message); process.exit(1); });
          JSEOF
          node register.js
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proton-v9
          path: '*.png'
          retention-days: 1
