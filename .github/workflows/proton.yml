name: proton-v5
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps
      
      - name: Register ProtonMail
        run: |
          cat > register.js << 'JSEOF'
          const { chromium } = require('playwright');
          const crypto = require('crypto');
          
          const rand = crypto.randomBytes(4).toString('hex');
          const username = `hxtest${rand}`;
          const password = 'HxTest2026!@#';
          
          console.log(`[*] Username: ${username}@proton.me`);
          console.log(`[*] Password: ${password}`);
          
          (async () => {
              const browser = await chromium.launch({
                  headless: true,
                  args: ['--no-sandbox', '--disable-blink-features=AutomationControlled']
              });
              
              const context = await browser.newContext({
                  locale: 'en-US',
                  userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36'
              });
              
              const page = await context.newPage();
              
              await page.addInitScript(() => {
                  Object.defineProperty(navigator, 'webdriver', { get: () => false });
              });
              
              // Navigate to signup
              console.log('[*] Navigating...');
              await page.goto('https://account.proton.me/signup?plan=free', { 
                  waitUntil: 'domcontentloaded', 
                  timeout: 30000 
              });
              await page.waitForTimeout(12000);
              
              console.log(`[*] Title: ${await page.title()}`);
              console.log(`[*] URL: ${page.url()}`);
              
              await page.screenshot({ path: 'step1.png', fullPage: true });
              
              // Dump all inputs
              const inputs = await page.evaluate(() => {
                  return Array.from(document.querySelectorAll('input')).map((i, idx) => ({
                      idx,
                      id: i.id,
                      name: i.name,
                      type: i.type,
                      placeholder: i.placeholder,
                      testid: i.getAttribute('data-testid'),
                      ariaLabel: i.getAttribute('aria-label'),
                      disabled: i.disabled,
                      readOnly: i.readOnly,
                      hidden: i.hidden,
                      offsetParent: i.offsetParent !== null,
                      rect: JSON.parse(JSON.stringify(i.getBoundingClientRect()))
                  }));
              });
              console.log(`[*] Inputs: ${JSON.stringify(inputs, null, 2)}`);
              
              // Use evaluate() to fill inputs directly (bypass click/fill interaction)
              // Find inputs by data-testid="input-input-element"
              const filled = await page.evaluate((user, pwd) => {
                  const els = document.querySelectorAll('[data-testid="input-input-element"]');
                  const results = [];
                  
                  for (let i = 0; i < els.length; i++) {
                      const el = els[i];
                      const isPassword = el.type === 'password' || el.getAttribute('aria-label')?.toLowerCase().includes('password');
                      
                      if (i === 0 && !isPassword) {
                          // First non-password input = username/email
                          el.focus();
                          el.value = user;
                          el.dispatchEvent(new Event('input', { bubbles: true }));
                          el.dispatchEvent(new Event('change', { bubbles: true }));
                          results.push({ idx: i, filled: 'username', value: el.value });
                      } else if (isPassword) {
                          // Password input
                          el.focus();
                          el.value = pwd;
                          el.dispatchEvent(new Event('input', { bubbles: true }));
                          el.dispatchEvent(new Event('change', { bubbles: true }));
                          results.push({ idx: i, filled: 'password', value: '***' });
                      }
                  }
                  
                  return results;
              }, username, password);
              console.log(`[*] Filled: ${JSON.stringify(filled)}`);
              
              await page.waitForTimeout(1000);
              await page.screenshot({ path: 'step2.png', fullPage: true });
              
              // Check if form is filled
              const formState = await page.evaluate(() => {
                  const inputs = document.querySelectorAll('[data-testid="input-input-element"]');
                  return Array.from(inputs).map(i => ({
                      type: i.type,
                      value: i.value.substring(0, 20),
                      ariaLabel: i.getAttribute('aria-label')
                  }));
              });
              console.log(`[*] Form state: ${JSON.stringify(formState)}`);
              
              // Find and click submit button
              const submitInfo = await page.evaluate(() => {
                  const btns = Array.from(document.querySelectorAll('button'));
                  return btns.map(b => ({
                      text: b.innerText.trim().substring(0, 60),
                      testid: b.getAttribute('data-testid'),
                      type: b.type,
                      disabled: b.disabled
                  })).filter(b => b.text && !b.text.includes('month') && !b.text.includes('US$'));
              });
              console.log(`[*] Buttons: ${JSON.stringify(submitInfo, null, 2)}`);
              
              // Click the submit/signup button
              const clicked = await page.evaluate(() => {
                  const btns = Array.from(document.querySelectorAll('button'));
                  // Look for "Start using" or "Create" or "Next" or "Sign up" or "Get started"
                  for (const btn of btns) {
                      const text = btn.innerText.trim().toLowerCase();
                      if (text.includes('start using') || text.includes('create') || 
                          text.includes('get started') || text.includes('sign up') ||
                          text.includes('next') || text.includes('continue')) {
                          btn.click();
                          return btn.innerText.trim();
                      }
                  }
                  return null;
              });
              console.log(`[*] Clicked button: ${clicked}`);
              
              await page.waitForTimeout(10000);
              
              // Check result
              console.log(`[*] After submit - Title: ${await page.title()}`);
              console.log(`[*] After submit - URL: ${page.url()}`);
              
              const bodyText = await page.evaluate(() => document.body.innerText.substring(0, 500));
              console.log(`[*] Body: ${bodyText}`);
              
              await page.screenshot({ path: 'step3.png', fullPage: true });
              
              // Check verification requirements
              const verify = await page.evaluate(() => {
                  const t = document.body.innerText;
                  const h = document.body.innerHTML.toLowerCase();
                  return {
                      phone: t.includes('phone') || t.includes('Phone') || t.includes('mobile'),
                      captcha: h.includes('captcha') || h.includes('recaptcha') || h.includes('hcaptcha'),
                      recovery: t.includes('recovery') || t.includes('Recovery'),
                      verify: t.includes('verify') || t.includes('Verify'),
                      success: t.includes('Inbox') || t.includes('Welcome') || t.includes('Congratulations'),
                      sms: t.includes('SMS') || t.includes('sms')
                  };
              });
              console.log(`[*] Verification: ${JSON.stringify(verify)}`);
              
              // Try to skip any verification steps
              for (let step = 0; step < 3; step++) {
                  const skipBtn = await page.evaluate(() => {
                      const btns = Array.from(document.querySelectorAll('button, a'));
                      for (const btn of btns) {
                          const text = btn.innerText.trim().toLowerCase();
                          if (text === 'skip' || text === 'skip for now' || text === 'maybe later') {
                              btn.click();
                              return btn.innerText.trim();
                          }
                      }
                      return null;
                  });
                  
                  if (skipBtn) {
                      console.log(`[*] Skipped: "${skipBtn}"`);
                      await page.waitForTimeout(5000);
                  } else {
                      break;
                  }
              }
              
              // Final state
              console.log(`\n=== FINAL ===`);
              console.log(`Title: ${await page.title()}`);
              console.log(`URL: ${page.url()}`);
              const finalBody = await page.evaluate(() => document.body.innerText.substring(0, 500));
              console.log(`Body: ${finalBody}`);
              console.log(`\n=== CREDENTIALS ===`);
              console.log(`Email: ${username}@proton.me`);
              console.log(`Password: ${password}`);
              
              await page.screenshot({ path: 'final.png', fullPage: true });
              
              await browser.close();
          })().catch(e => {
              console.error('[-] Fatal:', e.message);
              process.exit(1);
          });
          JSEOF
          node register.js
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proton-v5
          path: '*.png'
          retention-days: 1
