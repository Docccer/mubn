name: proton-v6
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps
      
      - name: Register ProtonMail
        run: |
          cat > register.js << 'JSEOF'
          const { chromium } = require('playwright');
          const crypto = require('crypto');
          
          const rand = crypto.randomBytes(4).toString('hex');
          const username = `hxtest${rand}`;
          const password = 'HxTest2026!@#';
          
          console.log(`[*] Username: ${username}@proton.me`);
          console.log(`[*] Password: ${password}`);
          
          (async () => {
              const browser = await chromium.launch({
                  headless: true,
                  args: ['--no-sandbox', '--disable-blink-features=AutomationControlled']
              });
              
              const context = await browser.newContext({
                  locale: 'en-US',
                  userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36'
              });
              
              const page = await context.newPage();
              
              await page.addInitScript(() => {
                  Object.defineProperty(navigator, 'webdriver', { get: () => false });
              });
              
              console.log('[*] Navigating...');
              await page.goto('https://account.proton.me/signup?plan=free', { 
                  waitUntil: 'domcontentloaded', 
                  timeout: 30000 
              });
              await page.waitForTimeout(12000);
              
              console.log(`[*] Title: ${await page.title()}`);
              console.log(`[*] URL: ${page.url()}`);
              
              await page.screenshot({ path: 'step1.png', fullPage: true });
              
              // Dump inputs
              const inputs = await page.evaluate(() => {
                  return Array.from(document.querySelectorAll('input')).map((i, idx) => ({
                      idx, id: i.id, name: i.name, type: i.type,
                      placeholder: i.placeholder,
                      testid: i.getAttribute('data-testid'),
                      ariaLabel: i.getAttribute('aria-label'),
                      visible: i.offsetParent !== null
                  }));
              });
              console.log(`[*] Inputs: ${JSON.stringify(inputs, null, 2)}`);
              
              // Fill using evaluate with single arg object
              const filled = await page.evaluate(({user, pwd}) => {
                  const els = document.querySelectorAll('[data-testid="input-input-element"]');
                  const results = [];
                  
                  for (let i = 0; i < els.length; i++) {
                      const el = els[i];
                      const isPassword = el.type === 'password';
                      
                      if (!isPassword && i === 0) {
                          el.focus();
                          el.value = user;
                          el.dispatchEvent(new Event('input', { bubbles: true }));
                          el.dispatchEvent(new Event('change', { bubbles: true }));
                          results.push({ idx: i, filled: 'username', value: el.value });
                      } else if (isPassword) {
                          el.focus();
                          el.value = pwd;
                          el.dispatchEvent(new Event('input', { bubbles: true }));
                          el.dispatchEvent(new Event('change', { bubbles: true }));
                          results.push({ idx: i, filled: 'password' });
                      }
                  }
                  return results;
              }, { user: username, pwd: password });
              console.log(`[*] Filled: ${JSON.stringify(filled)}`);
              
              await page.waitForTimeout(1000);
              
              // Verify fill worked
              const vals = await page.evaluate(() => {
                  const els = document.querySelectorAll('[data-testid="input-input-element"]');
                  return Array.from(els).map(e => ({ type: e.type, value: e.value.substring(0, 20) }));
              });
              console.log(`[*] Values: ${JSON.stringify(vals)}`);
              
              await page.screenshot({ path: 'step2.png', fullPage: true });
              
              // List all buttons
              const btns = await page.evaluate(() => {
                  return Array.from(document.querySelectorAll('button')).map(b => ({
                      text: b.innerText.trim().substring(0, 60),
                      testid: b.getAttribute('data-testid'),
                      disabled: b.disabled
                  }));
              });
              console.log(`[*] Buttons: ${JSON.stringify(btns, null, 2)}`);
              
              // Click submit button
              const clicked = await page.evaluate(() => {
                  const btns = Array.from(document.querySelectorAll('button'));
                  const targets = ['start using', 'create account', 'get started', 'sign up', 'next', 'continue', 'register'];
                  for (const btn of btns) {
                      const text = btn.innerText.trim().toLowerCase();
                      if (targets.some(t => text.includes(t))) {
                          btn.click();
                          return btn.innerText.trim();
                      }
                  }
                  return null;
              });
              console.log(`[*] Clicked: ${clicked}`);
              
              if (!clicked) {
                  console.log('[!] No submit button found. Trying form submit...');
                  await page.evaluate(() => {
                      const form = document.querySelector('form');
                      if (form) form.submit();
                  });
              }
              
              await page.waitForTimeout(10000);
              
              console.log(`[*] After submit - Title: ${await page.title()}`);
              console.log(`[*] After submit - URL: ${page.url()}`);
              
              const bodyText = await page.evaluate(() => document.body.innerText.substring(0, 800));
              console.log(`[*] Body: ${bodyText}`);
              
              await page.screenshot({ path: 'step3.png', fullPage: true });
              
              // Check verification
              const verify = await page.evaluate(() => {
                  const t = document.body.innerText;
                  const h = document.body.innerHTML.toLowerCase();
                  return {
                      phone: t.includes('phone') || t.includes('Phone'),
                      captcha: h.includes('captcha') || h.includes('recaptcha'),
                      recovery: t.includes('recovery'),
                      success: t.includes('Inbox') || t.includes('Welcome')
                  };
              });
              console.log(`[*] Verification: ${JSON.stringify(verify)}`);
              
              // Try skipping steps
              for (let s = 0; s < 5; s++) {
                  const skipped = await page.evaluate(() => {
                      const btns = Array.from(document.querySelectorAll('button, a'));
                      for (const btn of btns) {
                          const text = btn.innerText.trim().toLowerCase();
                          if (text === 'skip' || text === 'skip for now' || text === 'maybe later' || text === 'not now') {
                              btn.click();
                              return btn.innerText.trim();
                          }
                      }
                      return null;
                  });
                  if (skipped) {
                      console.log(`[*] Skipped: "${skipped}"`);
                      await page.waitForTimeout(5000);
                  } else break;
              }
              
              // Final
              console.log(`\n=== FINAL ===`);
              console.log(`Title: ${await page.title()}`);
              console.log(`URL: ${page.url()}`);
              console.log(`Body: ${await page.evaluate(() => document.body.innerText.substring(0, 500))}`);
              console.log(`\n=== CREDENTIALS ===`);
              console.log(`Email: ${username}@proton.me`);
              console.log(`Password: ${password}`);
              
              await page.screenshot({ path: 'final.png', fullPage: true });
              
              await browser.close();
          })().catch(e => {
              console.error('[-] Fatal:', e.message);
              process.exit(1);
          });
          JSEOF
          node register.js
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proton-v6
          path: '*.png'
          retention-days: 1
