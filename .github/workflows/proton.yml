name: proton-register
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps
      
      - name: Register ProtonMail
        run: |
          cat > register.js << 'JSEOF'
          const { chromium } = require('playwright');
          const crypto = require('crypto');
          
          const rand = crypto.randomBytes(4).toString('hex');
          const username = `hxtest${rand}`;
          const password = 'HxTest2026!@#';
          
          console.log(`[*] Username: ${username}@proton.me`);
          console.log(`[*] Password: ${password}`);
          
          (async () => {
              const browser = await chromium.launch({
                  headless: true,
                  args: ['--no-sandbox', '--disable-blink-features=AutomationControlled']
              });
              
              const context = await browser.newContext({
                  locale: 'en-US',
                  userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36'
              });
              
              const page = await context.newPage();
              
              // Override webdriver
              await page.addInitScript(() => {
                  Object.defineProperty(navigator, 'webdriver', { get: () => false });
              });
              
              console.log('[*] Navigating to ProtonMail signup...');
              await page.goto('https://account.proton.me/signup', { waitUntil: 'networkidle', timeout: 60000 });
              
              const title = await page.title();
              console.log(`[*] Title: ${title}`);
              
              // Wait for SPA to render
              await page.waitForTimeout(5000);
              
              // Screenshot
              await page.screenshot({ path: 'proton1.png', fullPage: true });
              
              // Get all text
              const bodyText = await page.evaluate(() => document.body.innerText);
              console.log(`[*] Body text (first 500): ${bodyText.substring(0, 500)}`);
              
              // Get all inputs
              const inputs = await page.evaluate(() => {
                  return Array.from(document.querySelectorAll('input')).map(i => ({
                      id: i.id, name: i.name, type: i.type,
                      placeholder: i.placeholder,
                      ariaLabel: i.getAttribute('aria-label')
                  }));
              });
              console.log(`[*] Inputs: ${JSON.stringify(inputs, null, 2)}`);
              
              // Get all buttons
              const buttons = await page.evaluate(() => {
                  return Array.from(document.querySelectorAll('button, a[role="button"], [data-testid]')).map(b => ({
                      text: b.innerText.trim().substring(0, 50),
                      testid: b.getAttribute('data-testid'),
                      tag: b.tagName
                  }));
              });
              console.log(`[*] Buttons: ${JSON.stringify(buttons, null, 2)}`);
              
              // Check for CAPTCHA
              const captchaCheck = await page.evaluate(() => {
                  const html = document.body.innerHTML.toLowerCase();
                  return {
                      recaptcha: html.includes('recaptcha'),
                      hcaptcha: html.includes('hcaptcha'),
                      funcaptcha: html.includes('funcaptcha'),
                      captcha: html.includes('captcha'),
                      perimeterx: html.includes('perimeterx') || html.includes('hsprotect'),
                      turnstile: html.includes('turnstile'),
                      cloudflare: html.includes('cloudflare')
                  };
              });
              console.log(`[*] CAPTCHA: ${JSON.stringify(captchaCheck)}`);
              
              // Try to find "Free" plan or "Create a free account"
              const freeLink = await page.$('a:has-text("Free")') || 
                               await page.$('button:has-text("Free")') ||
                               await page.$('[data-testid="free-plan"]') ||
                               await page.$('a:has-text("Get started")');
              
              if (freeLink) {
                  console.log('[*] Found free plan link, clicking...');
                  await freeLink.click();
                  await page.waitForTimeout(5000);
                  await page.screenshot({ path: 'proton2.png', fullPage: true });
                  
                  const newInputs = await page.evaluate(() => {
                      return Array.from(document.querySelectorAll('input')).map(i => ({
                          id: i.id, name: i.name, type: i.type,
                          placeholder: i.placeholder
                      }));
                  });
                  console.log(`[*] Inputs after click: ${JSON.stringify(newInputs, null, 2)}`);
              }
              
              // Try to find and fill username/email field
              const emailField = await page.$('#email') ||
                                 await page.$('input[autocomplete="email"]') ||
                                 await page.$('input[type="text"]');
              
              if (emailField) {
                  console.log('[*] Found email field, filling...');
                  await emailField.fill(username);
                  await page.waitForTimeout(1000);
              }
              
              // Look for password field
              const pwdField = await page.$('#password') ||
                               await page.$('input[type="password"]');
              
              if (pwdField) {
                  console.log('[*] Found password field, filling...');
                  await pwdField.fill(password);
                  await page.waitForTimeout(1000);
              }
              
              // Look for repeat password
              const pwd2Field = await page.$('#repeat-password') ||
                                await page.$$('input[type="password"]');
              
              if (Array.isArray(pwd2Field) && pwd2Field.length > 1) {
                  console.log('[*] Found repeat password field, filling...');
                  await pwd2Field[1].fill(password);
              }
              
              await page.screenshot({ path: 'proton3.png', fullPage: true });
              
              // Get the full page HTML for analysis
              const html = await page.content();
              require('fs').writeFileSync('proton_page.html', html);
              console.log(`[*] Page HTML saved (${html.length} bytes)`);
              
              // Try clicking "Create account" or similar
              const createBtn = await page.$('button:has-text("Create account")') ||
                                await page.$('button:has-text("Create")') ||
                                await page.$('button:has-text("Sign up")') ||
                                await page.$('button[type="submit"]');
              
              if (createBtn) {
                  const btnText = await createBtn.innerText();
                  console.log(`[*] Found button: "${btnText}", clicking...`);
                  await createBtn.click();
                  await page.waitForTimeout(10000);
                  
                  const newTitle = await page.title();
                  const newBody = await page.evaluate(() => document.body.innerText.substring(0, 500));
                  console.log(`[*] After click - Title: ${newTitle}`);
                  console.log(`[*] After click - Body: ${newBody}`);
                  
                  await page.screenshot({ path: 'proton4.png', fullPage: true });
                  
                  // Check for CAPTCHA again
                  const captchaCheck2 = await page.evaluate(() => {
                      const html = document.body.innerHTML.toLowerCase();
                      return {
                          recaptcha: html.includes('recaptcha'),
                          hcaptcha: html.includes('hcaptcha'),
                          captcha: html.includes('captcha'),
                          human: html.includes('prove') || html.includes('human')
                      };
                  });
                  console.log(`[*] CAPTCHA after submit: ${JSON.stringify(captchaCheck2)}`);
              }
              
              console.log(`\n=== RESULT ===`);
              console.log(`Email: ${username}@proton.me`);
              console.log(`Password: ${password}`);
              
              await browser.close();
          })().catch(e => {
              console.error('[-] Error:', e.message);
              process.exit(1);
          });
          JSEOF
          node register.js
      
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proton-screenshots
          path: '*.png'
          retention-days: 1
      
      - name: Upload HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proton-html
          path: '*.html'
          retention-days: 1
