name: proton-v9
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Create script
        shell: bash
        run: |
          cat > /tmp/reg.py << 'EOF'
import sys, time, random, string
sys.stdout.reconfigure(encoding='utf-8', errors='replace')
from playwright.sync_api import sync_playwright

suffix = ''.join(random.choices(string.hexdigits[:16], k=8))
username = "hxtest" + suffix
password = "HxTest2026!@#"
print("[*] Username: " + username, flush=True)

with sync_playwright() as p:
    browser = p.chromium.launch(headless=True, args=['--no-sandbox'])
    page = browser.new_page(viewport={'width': 1280, 'height': 900})
    page.goto('https://account.proton.me/signup?plan=free', timeout=60000)
    page.wait_for_load_state('networkidle', timeout=60000)
    time.sleep(5)

    for sel in ['button:has-text("Close")', 'button:has-text("No thanks")', 'button:has-text("Skip")']:
        try:
            btn = page.locator(sel)
            if btn.is_visible(timeout=2000):
                btn.click()
                time.sleep(1)
        except:
            pass

    page.screenshot(path="step1.png")

    fill_result = page.evaluate("""(args) => {
        const nativeSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;
        const inputs = document.querySelectorAll('[data-testid="input-input-element"]');
        const info = [];
        
        for (let i = 0; i < inputs.length; i++) {
            const el = inputs[i];
            const rect = el.getBoundingClientRect();
            info.push({index: i, id: el.id, type: el.type, x: rect.x, y: rect.y, w: rect.width, h: rect.height});
        }
        
        let usernameInput = null;
        let passwordInput = null;
        for (const inp of inputs) {
            if (inp.id === 'username') { usernameInput = inp; }
            if (inp.id === 'password' || inp.type === 'password') { passwordInput = inp; }
        }
        if (!usernameInput && inputs.length > 0) usernameInput = inputs[0];
        if (!passwordInput && inputs.length > 1) passwordInput = inputs[1];
        
        let uVal = 'not found';
        let pVal = 'not found';
        
        if (usernameInput) {
            usernameInput.focus();
            nativeSetter.call(usernameInput, args.username);
            usernameInput.dispatchEvent(new Event('input', { bubbles: true }));
            usernameInput.dispatchEvent(new Event('change', { bubbles: true }));
            uVal = usernameInput.value;
        }
        
        if (passwordInput) {
            passwordInput.focus();
            nativeSetter.call(passwordInput, args.password);
            passwordInput.dispatchEvent(new Event('input', { bubbles: true }));
            passwordInput.dispatchEvent(new Event('change', { bubbles: true }));
            pVal = passwordInput.value;
        }
        
        const confirmEl = document.getElementById('password-confirm') || (inputs.length > 2 ? inputs[2] : null);
        let cVal = 'not found';
        if (confirmEl) {
            confirmEl.focus();
            nativeSetter.call(confirmEl, args.password);
            confirmEl.dispatchEvent(new Event('input', { bubbles: true }));
            confirmEl.dispatchEvent(new Event('change', { bubbles: true }));
            cVal = confirmEl.value;
        }
        
        return {inputs: info, username: uVal, password: pVal, confirm: cVal};
    }""", {"username": username, "password": password})

    print("[*] Fill: " + str(fill_result), flush=True)
    page.screenshot(path="step2.png")

    time.sleep(2)
    check = page.evaluate("""() => {
        const inputs = document.querySelectorAll('[data-testid="input-input-element"]');
        return Array.from(inputs).map(e => ({id: e.id, type: e.type, value: e.value}));
    }""")
    print("[*] Check: " + str(check), flush=True)

    submit = page.locator('button:has-text("Start using Proton Mail now")')
    if submit.is_visible(timeout=3000):
        submit.click()
        time.sleep(5)
        page.screenshot(path="step3.png")
        print("[*] URL: " + page.url, flush=True)
        if 'signup' not in page.url:
            print("[!] SUCCESS", flush=True)
        else:
            errs = page.evaluate("""() => {
                return Array.from(document.querySelectorAll('[class*="error"], [role="alert"]'))
                    .map(e => e.textContent.trim()).filter(t => t.length > 0);
            }""")
            print("[!] Errors: " + str(errs), flush=True)

    page.screenshot(path="final.png")
    browser.close()

print("Email: " + username + "@proton.me", flush=True)
print("Password: " + password, flush=True)
EOF

      - name: Run
        shell: cmd
        run: python /tmp/reg.py
