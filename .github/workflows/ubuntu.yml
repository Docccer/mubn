name: OpenAI Register
on: [workflow_dispatch]

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run Registration
        env:
          OPENAI_EMAIL: hxtestwlr8vw@outlook.com
          OPENAI_PASSWORD: "HxTest2026!@#"
          OUTLOOK_USER: hxtestwlr8vw@outlook.com
          OUTLOOK_PASS: "HxTest2026!@#"
        run: |
          echo '' | base64 -d > /tmp/openai_reg.py
          python3 /tmp/openai_reg.py

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-screenshots
          path: /tmp/openai_screenshots/
          retention-days: 3
