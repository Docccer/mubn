name: outlook-desktop2
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - name: Install
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Create script
        shell: bash
        run: |
          cat > /tmp/reg.py << 'ENDSCRIPT'
import sys
import time
import random
import string
sys.stdout.reconfigure(encoding="utf-8", errors="replace")
from playwright.sync_api import sync_playwright

suffix = "".join(random.choices(string.hexdigits[:16], k=8))
username = "hxtest" + suffix
password = "HxTest2026!@#"
print("[*] Username: " + username, flush=True)
print("[*] Password: " + password, flush=True)

with sync_playwright() as p:
    browser = p.chromium.launch(headless=True, args=["--no-sandbox"])
    page = browser.new_page(viewport={"width": 1280, "height": 900})
    page.goto("https://account.proton.me/signup?plan=free", timeout=60000)
    page.wait_for_load_state("networkidle", timeout=60000)
    time.sleep(5)

    # Close popups
    for sel in ['button:has-text("Close")', 'button:has-text("No thanks")', 'button:has-text("Skip")']:
        try:
            btn = page.locator(sel)
            if btn.is_visible(timeout=2000):
                btn.click()
                time.sleep(1)
        except:
            pass

    page.screenshot(path="step1.png")
    print("[*] step1 saved", flush=True)

    # Get input info
    info = page.evaluate("""() => {
        const inputs = document.querySelectorAll('[data-testid="input-input-element"]');
        const results = [];
        for (let i = 0; i < inputs.length; i++) {
            const el = inputs[i];
            const rect = el.getBoundingClientRect();
            const style = window.getComputedStyle(el);
            results.push({
                index: i, id: el.id, type: el.type,
                visibility: style.visibility,
                x: Math.round(rect.x), y: Math.round(rect.y),
                w: Math.round(rect.width), h: Math.round(rect.height)
            });
        }
        return results;
    }""")
    print("[*] Inputs: " + str(info), flush=True)

    # React native setter approach
    fill_js = """
    (args) => {
        const nativeSetter = Object.getOwnPropertyDescriptor(
            window.HTMLInputElement.prototype, 'value'
        ).set;
        const inputs = document.querySelectorAll('[data-testid="input-input-element"]');
        
        let uname = null, pwd = null, confirm = null;
        for (const inp of inputs) {
            if (inp.id === 'username' || (!uname && inp.type !== 'password')) uname = inp;
            if (inp.id === 'password' || inp.type === 'password') pwd = inp;
        }
        if (!uname && inputs.length > 0) uname = inputs[0];
        if (!pwd && inputs.length > 1) pwd = inputs[1];
        
        let ur = 'skip', pr = 'skip', cr = 'skip';
        
        if (uname) {
            uname.focus();
            nativeSetter.call(uname, args.u);
            uname.dispatchEvent(new Event('input', {bubbles: true}));
            uname.dispatchEvent(new Event('change', {bubbles: true}));
            ur = uname.value;
        }
        if (pwd) {
            pwd.focus();
            nativeSetter.call(pwd, args.p);
            pwd.dispatchEvent(new Event('input', {bubbles: true}));
            pwd.dispatchEvent(new Event('change', {bubbles: true}));
            pr = pwd.value;
        }
        const cel = document.getElementById('password-confirm');
        if (cel) {
            cel.focus();
            nativeSetter.call(cel, args.p);
            cel.dispatchEvent(new Event('input', {bubbles: true}));
            cel.dispatchEvent(new Event('change', {bubbles: true}));
            cr = cel.value;
        }
        return {u: ur, p: pr, c: cr};
    }
    """
    result = page.evaluate(fill_js, {"u": username, "p": password})
    print("[*] Fill result: " + str(result), flush=True)
    page.screenshot(path="step2.png")

    time.sleep(2)
    vals = page.evaluate("""() => {
        const inputs = document.querySelectorAll('[data-testid="input-input-element"]');
        return Array.from(inputs).map(e => ({id: e.id, val: e.value.substring(0, 20)}));
    }""")
    print("[*] Values check: " + str(vals), flush=True)

    # Also try locator.fill as backup
    if not result.get("u") or result["u"] == "skip" or result["u"] == "":
        print("[*] React setter failed for username, trying locator.fill...", flush=True)
        try:
            loc = page.locator('[data-testid="input-input-element"]').first
            loc.click(force=True, timeout=5000)
            loc.fill(username, timeout=5000)
            print("[*] locator.fill username done", flush=True)
        except Exception as e:
            print("[!] locator.fill failed: " + str(e), flush=True)
            # Last resort: keyboard type
            try:
                loc = page.locator('#username')
                loc.click(force=True, timeout=5000)
                page.keyboard.type(username, delay=50)
                print("[*] keyboard.type username done", flush=True)
            except Exception as e2:
                print("[!] keyboard.type failed: " + str(e2), flush=True)

    if not result.get("p") or result["p"] == "skip" or result["p"] == "":
        print("[*] React setter failed for password, trying locator.fill...", flush=True)
        try:
            loc = page.locator('#password')
            loc.click(force=True, timeout=5000)
            loc.fill(password, timeout=5000)
            print("[*] locator.fill password done", flush=True)
        except Exception as e:
            print("[!] locator.fill password failed: " + str(e), flush=True)

    page.screenshot(path="step2b.png")

    # Click submit
    submit = page.locator('button:has-text("Start using Proton Mail now")')
    if submit.is_visible(timeout=5000):
        print("[*] Clicking submit...", flush=True)
        submit.click()
        time.sleep(5)
        page.screenshot(path="step3.png")
        url = page.url
        title = page.title()
        print("[*] After submit URL: " + url, flush=True)
        print("[*] Title: " + title, flush=True)
        if "signup" not in url:
            print("[!] SUCCESS - past signup page!", flush=True)
        else:
            print("[!] Still on signup page", flush=True)
            # Check errors
            errs = page.evaluate("""() => {
                const els = document.querySelectorAll('[class*="error"], [role="alert"], [class*="notification"]');
                return Array.from(els).map(e => e.textContent.trim()).filter(t => t.length > 0 && t.length < 200);
            }""")
            print("[!] Page text sample: " + page.evaluate("() => document.body.innerText.substring(0, 500)"), flush=True)
            if errs:
                print("[!] Errors: " + str(errs), flush=True)
    else:
        print("[!] Submit button not found", flush=True)

    page.screenshot(path="final.png")
    browser.close()

print("", flush=True)
print("=== CREDENTIALS ===", flush=True)
print("Email: " + username + "@proton.me", flush=True)
print("Password: " + password, flush=True)
print("=== END ===", flush=True)
ENDSCRIPT

      - name: Run script
        shell: cmd
        run: python /tmp/reg.py
