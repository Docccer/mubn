name: outlook-desktop
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: windows-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install pyautogui pillow pygetwindow
      
      - name: Run Outlook registration
        run: |
          python << 'PYEOF'
          import subprocess
          import time
          import random
          import string
          import pyautogui
          import os
          import sys
          
          sys.stdout.reconfigure(encoding='utf-8', errors='replace')
          
          # Generate random credentials
          rand = ''.join(random.choices(string.hexdigits[:16], k=8))
          email_user = f"hxtest{rand}"
          email = f"{email_user}@outlook.com"
          password = "HxTest2026!@#"
          
          print(f"[*] Email: {email}", flush=True)
          print(f"[*] Password: {password}", flush=True)
          
          # Configure pyautogui
          pyautogui.FAILSAFE = True
          pyautogui.PAUSE = 0.1
          
          # Step 1: Launch Chrome normally (no automation flags!)
          print("\n[*] Launching Chrome...", flush=True)
          chrome_paths = [
              r"C:\Program Files\Google\Chrome\Application\chrome.exe",
              r"C:\Program Files (x86)\Google\Chrome\Application\chrome.exe",
              r"C:\hostedtoolcache\windows\Chrome\stable\x64\chrome.exe",
          ]
          
          chrome_path = None
          for p in chrome_paths:
              if os.path.exists(p):
                  chrome_path = p
                  break
          
          if not chrome_path:
              # Try to find chrome
              import shutil
              chrome_path = shutil.which("chrome") or shutil.which("chrome.exe")
              if not chrome_path:
                  print("[-] Chrome not found, installing...", flush=True)
                  # Install Chrome via chocolatey or download
                  os.system('choco install googlechrome -y --no-progress 2>nul')
                  for p in chrome_paths:
                      if os.path.exists(p):
                          chrome_path = p
                          break
          
          if not chrome_path:
              print("[-] Chrome not available, trying Edge...", flush=True)
              chrome_path = r"C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
              if not os.path.exists(chrome_path):
                  chrome_path = "msedge.exe"
          
          print(f"[*] Using browser: {chrome_path}", flush=True)
          
          # Launch browser with Outlook signup
          subprocess.Popen([chrome_path, "--start-maximized", f"https://outlook.live.com/owa/0/?nlp=1&signup=1"])
          print("[*] Browser launched, waiting 15s for page load...", flush=True)
          time.sleep(15)
          
          # Take initial screenshot
          try:
              screenshot = pyautogui.screenshot()
              screenshot.save("screen1.png")
              print("[*] Screenshot 1 saved", flush=True)
          except Exception as e:
              print(f"[!] Screenshot failed: {e}", flush=True)
          
          # Get screen size
          screen_width, screen_height = pyautogui.size()
          print(f"[*] Screen: {screen_width}x{screen_height}", flush=True)
          
          # Find Chrome/Edge window and activate it
          try:
              import pygetwindow as gw
              windows = gw.getWindowsWithTitle('Outlook')
              if not windows:
                  windows = gw.getWindowsWithTitle('Chrome')
              if not windows:
                  windows = gw.getWindowsWithTitle('Edge')
              if windows:
                  win = windows[0]
                  win.activate()
                  time.sleep(1)
                  print(f"[*] Activated window: {win.title}", flush=True)
              else:
                  print("[!] No browser window found, clicking center", flush=True)
          except Exception as e:
              print(f"[!] Window activation: {e}", flush=True)
          
          # Click on the page to focus it
          pyautogui.click(screen_width // 2, screen_height // 2)
          time.sleep(1)
          
          # Fill the email field
          # On Outlook signup, the first input is the email/username field
          # We'll click on it (approximately where it should be)
          # The form is usually centered on the page
          
          # First, let's try clicking where the email field should be
          # Outlook signup form is typically centered, about 1/3 from top
          form_x = screen_width // 2
          form_y = screen_height // 3
          
          print(f"\n[*] Clicking at ({form_x}, {form_y})...", flush=True)
          pyautogui.click(form_x, form_y)
          time.sleep(1)
          
          # Clear any existing text
          pyautogui.hotkey('ctrl', 'a')
          time.sleep(0.3)
          pyautogui.press('delete')
          time.sleep(0.3)
          
          # Type email with human-like delays
          print("[*] Typing email...", flush=True)
          for char in email_user:
              pyautogui.write(char, interval=random.uniform(0.05, 0.12))
              time.sleep(random.uniform(0.01, 0.03))
          
          # Click the @ domain dropdown if needed, or just type @outlook.com
          time.sleep(0.5)
          
          # Take screenshot
          try:
              screenshot = pyautogui.screenshot()
              screenshot.save("screen2.png")
              print("[*] Screenshot 2 saved", flush=True)
          except:
              pass
          
          # Click Next/Submit button
          print("\n[*] Pressing Enter to submit email...", flush=True)
          pyautogui.press('enter')
          time.sleep(5)
          
          # Take screenshot
          try:
              screenshot = pyautogui.screenshot()
              screenshot.save("screen3.png")
              print("[*] Screenshot 3 saved", flush=True)
          except:
              pass
          
          # Fill password
          print("\n[*] Filling password...", flush=True)
          pyautogui.click(form_x, form_y + 50)  # Click below where email was
          time.sleep(0.5)
          
          for char in password:
              pyautogui.write(char, interval=random.uniform(0.05, 0.12))
              time.sleep(random.uniform(0.01, 0.03))
          
          time.sleep(1)
          pyautogui.press('enter')
          time.sleep(5)
          
          # Take screenshot
          try:
              screenshot = pyautogui.screenshot()
              screenshot.save("screen4.png")
              print("[*] Screenshot 4 saved", flush=True)
          except:
              pass
          
          # Continue filling form (birthday, name, etc.)
          # Birthday
          print("\n[*] Filling birthday...", flush=True)
          time.sleep(2)
          
          # Month dropdown - click and select
          pyautogui.click(form_x - 100, form_y + 100)
          time.sleep(0.5)
          pyautogui.press('down')  # Select January
          pyautogui.press('enter')
          time.sleep(0.5)
          
          # Day
          pyautogui.press('tab')
          time.sleep(0.3)
          pyautogui.write('15', interval=0.1)
          time.sleep(0.3)
          
          # Year
          pyautogui.press('tab')
          time.sleep(0.3)
          pyautogui.write('1995', interval=0.1)
          time.sleep(0.5)
          
          pyautogui.press('enter')
          time.sleep(5)
          
          # Name
          print("\n[*] Filling name...", flush=True)
          pyautogui.write('Test', interval=0.1)
          pyautogui.press('tab')
          time.sleep(0.3)
          pyautogui.write('User', interval=0.1)
          time.sleep(0.5)
          pyautogui.press('enter')
          time.sleep(5)
          
          # CAPTCHA handling - real mouse hold
          print("\n[*] Attempting CAPTCHA (press and hold)...", flush=True)
          try:
              screenshot = pyautogui.screenshot()
              screenshot.save("screen_captcha.png")
              print("[*] CAPTCHA screenshot saved", flush=True)
          except:
              pass
          
          # The CAPTCHA is a "Press and hold" button
          # We need to find it and hold click for ~8 seconds
          # It's usually near the center/bottom of the form
          captcha_x = form_x
          captcha_y = form_y + 150
          
          print(f"[*] Holding click at ({captcha_x}, {captcha_y}) for 8s...", flush=True)
          pyautogui.mouseDown(captcha_x, captcha_y)
          time.sleep(8 + random.uniform(0.1, 0.5))
          pyautogui.mouseUp(captcha_x, captcha_y)
          time.sleep(5)
          
          # Take final screenshots
          try:
              screenshot = pyautogui.screenshot()
              screenshot.save("screen_final.png")
              print("[*] Final screenshot saved", flush=True)
          except:
              pass
          
          print("\n=== CREDENTIALS ===", flush=True)
          print(f"Email: {email}", flush=True)
          print(f"Password: {password}", flush=True)
          print("\n=== DONE ===", flush=True)
          PYEOF
      
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outlook-desktop-screenshots
          path: '*.png'
          retention-days: 3
