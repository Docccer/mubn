name: outlook-desktop2
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: windows-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install pyautogui pillow pygetwindow
      
      - name: Create script
        shell: bash
        run: |
          cat > register.py << 'PYEOF'
          import subprocess
          import time
          import random
          import string
          import pyautogui
          import os
          import sys
          
          sys.stdout.reconfigure(encoding='utf-8', errors='replace')
          
          rand = ''.join(random.choices(string.hexdigits[:16], k=8))
          email_user = f"hxtest{rand}"
          email = f"{email_user}@outlook.com"
          password = "HxTest2026!@#"
          
          print(f"[*] Email: {email}", flush=True)
          print(f"[*] Password: {password}", flush=True)
          
          pyautogui.FAILSAFE = True
          pyautogui.PAUSE = 0.1
          
          # Find Chrome
          chrome_paths = [
              r"C:\Program Files\Google\Chrome\Application\chrome.exe",
              r"C:\Program Files (x86)\Google\Chrome\Application\chrome.exe",
          ]
          
          chrome_path = None
          for p in chrome_paths:
              if os.path.exists(p):
                  chrome_path = p
                  break
          
          if not chrome_path:
              import shutil
              chrome_path = shutil.which("chrome") or shutil.which("chrome.exe")
          
          if not chrome_path:
              print("[-] Chrome not found, trying Edge...", flush=True)
              chrome_path = r"C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
              if not os.path.exists(chrome_path):
                  chrome_path = "msedge.exe"
          
          print(f"[*] Using: {chrome_path}", flush=True)
          
          # Launch browser normally
          subprocess.Popen([chrome_path, "--start-maximized", "https://outlook.live.com/owa/0/?nlp=1&signup=1"])
          print("[*] Launched, waiting 15s...", flush=True)
          time.sleep(15)
          
          # Screenshot
          try:
              pyautogui.screenshot().save("s1.png")
              print("[*] s1.png saved", flush=True)
          except Exception as e:
              print(f"[!] Screenshot: {e}", flush=True)
          
          sw, sh = pyautogui.size()
          print(f"[*] Screen: {sw}x{sh}", flush=True)
          
          # Activate window
          try:
              import pygetwindow as gw
              wins = gw.getWindowsWithTitle('Outlook') or gw.getWindowsWithTitle('Chrome') or gw.getWindowsWithTitle('Edge')
              if wins:
                  wins[0].activate()
                  time.sleep(1)
                  print(f"[*] Window: {wins[0].title}", flush=True)
          except Exception as e:
              print(f"[!] Window: {e}", flush=True)
          
          # Click form area
          fx, fy = sw // 2, sh // 3
          pyautogui.click(fx, fy)
          time.sleep(1)
          
          # Tab to email field
          for _ in range(3):
              pyautogui.press('tab')
              time.sleep(0.3)
          
          # Type email
          print("[*] Typing email...", flush=True)
          pyautogui.hotkey('ctrl', 'a')
          time.sleep(0.2)
          for ch in email_user:
              pyautogui.write(ch, interval=random.uniform(0.04, 0.10))
          
          time.sleep(0.5)
          
          try:
              pyautogui.screenshot().save("s2.png")
              print("[*] s2.png saved", flush=True)
          except:
              pass
          
          # Submit email
          print("[*] Submitting...", flush=True)
          pyautogui.press('enter')
          time.sleep(8)
          
          try:
              pyautogui.screenshot().save("s3.png")
              print("[*] s3.png saved", flush=True)
          except:
              pass
          
          # Fill password
          print("[*] Password...", flush=True)
          for ch in password:
              pyautogui.write(ch, interval=random.uniform(0.04, 0.10))
          time.sleep(0.5)
          pyautogui.press('enter')
          time.sleep(8)
          
          try:
              pyautogui.screenshot().save("s4.png")
              print("[*] s4.png saved", flush=True)
          except:
              pass
          
          # Birthday
          print("[*] Birthday...", flush=True)
          time.sleep(2)
          pyautogui.press('tab')
          time.sleep(0.3)
          pyautogui.press('down')
          time.sleep(0.3)
          pyautogui.press('enter')
          time.sleep(0.5)
          pyautogui.press('tab')
          time.sleep(0.3)
          pyautogui.write('15', interval=0.1)
          time.sleep(0.3)
          pyautogui.press('tab')
          time.sleep(0.3)
          pyautogui.write('1995', interval=0.1)
          time.sleep(0.5)
          pyautogui.press('enter')
          time.sleep(8)
          
          try:
              pyautogui.screenshot().save("s5.png")
              print("[*] s5.png saved", flush=True)
          except:
              pass
          
          # Name
          print("[*] Name...", flush=True)
          pyautogui.write('Test', interval=0.1)
          pyautogui.press('tab')
          time.sleep(0.3)
          pyautogui.write('User', interval=0.1)
          time.sleep(0.5)
          pyautogui.press('enter')
          time.sleep(8)
          
          try:
              pyautogui.screenshot().save("s6.png")
              print("[*] s6.png saved", flush=True)
          except:
              pass
          
          # CAPTCHA - press and hold
          print("[*] CAPTCHA...", flush=True)
          try:
              pyautogui.screenshot().save("s_captcha.png")
          except:
              pass
          
          # Find CAPTCHA button area (typically center-bottom of form)
          cx, cy = fx, fy + 150
          print(f"[*] Hold at ({cx},{cy})...", flush=True)
          pyautogui.mouseDown(cx, cy)
          time.sleep(8.5)
          pyautogui.mouseUp(cx, cy)
          time.sleep(5)
          
          try:
              pyautogui.screenshot().save("s_final.png")
              print("[*] s_final.png saved", flush=True)
          except:
              pass
          
          print("\n=== CREDENTIALS ===", flush=True)
          print(f"Email: {email}", flush=True)
          print(f"Password: {password}", flush=True)
          print("=== DONE ===", flush=True)
          PYEOF
      
      - name: Run registration
        shell: cmd
        run: python register.py
      
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outlook-desktop-screenshots
          path: '*.png'
          retention-days: 3
