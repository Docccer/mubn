name: Outlook WARP
on:
  workflow_dispatch:
jobs:
  register:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install playwright && python -m playwright install --with-deps chromium
      - name: Run
        shell: bash
        run: |
          echo '' | base64 -d > warp_reg.py
          python warp_reg.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: '*.png'
