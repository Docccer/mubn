name: Windows
on: [workflow_dispatch]

jobs:
  windows-ssh:
    runs-on: windows-latest
    steps:
      # 1. 下载并静默安装 Tailscale
      - name: Install Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest -Uri https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale-setup.exe
          Start-Process -FilePath "tailscale-setup.exe" -ArgumentList "/quiet", "/norestart" -Wait

      # 2. 登录 Tailscale (换成你自己的 Secret 名字)
      - name: Connect to Tailscale
        shell: powershell
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey "${{ secrets.zeigonfo }}" --hostname "github-win-ssh" --unattended

      # 3. 开启 OpenSSH 服务并设置为 PowerShell 终端
      - name: Setup OpenSSH Server
        shell: powershell
        run: |
          # (A) 设置用户密码
          net user runneradmin "Aa@111111" 

          # (B) 安装 Windows 原生 OpenSSH 服务端
          Write-Host "正在安装 OpenSSH 服务端..."
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0

          # (C) 启动 sshd 服务，并设置为开机自启
          Start-Service sshd
          Set-Service -Name sshd -StartupType 'Automatic'

          # (D) 🔥关键：把 SSH 连进去之后的默认黑框框从老旧的 cmd 改为强大的 PowerShell
          New-ItemProperty -Path "HKLM:\SOFTWARE\OpenSSH" -Name DefaultShell -Value "C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe" -PropertyType String -Force

          # (E) 显示连接信息
          Write-Host "=========================================="
          Write-Host "🎉 Windows SSH 服务准备就绪！"
          Write-Host "你的 Tailscale IP 地址是："
          & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Host "连接命令: ssh runneradmin@你的IP"
          Write-Host "密码:     Aa@111111"
          Write-Host "=========================================="

      # 4. 保持运行 (6 小时)
      - name: Keep Alive
        run: Start-Sleep -Seconds 21600
