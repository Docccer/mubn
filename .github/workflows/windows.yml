name: Windows Pure SSH via Tailscale
on: [workflow_dispatch]

jobs:
  windows-ssh:
    runs-on: windows-latest
    steps:
      # 1. Download and install Tailscale
      - name: Install Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest -Uri https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale-setup.exe
          Start-Process -FilePath "tailscale-setup.exe" -ArgumentList "/quiet", "/norestart" -Wait

      # 2. Connect to Tailscale (注意替换 secrets 名字)
      - name: Connect to Tailscale
        shell: powershell
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey "${{ secrets.zeigonfo }}" --hostname "github-win-ssh" --unattended

      # 3. Setup OpenSSH Server
      - name: Setup OpenSSH Server
        shell: powershell
        run: |
          # (A) Set user password
          net user runneradmin "Aa@111111" 

          # (B) Install Windows OpenSSH Server
          Write-Host "Installing OpenSSH Server..."
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0

          # (C) Start sshd service
          Start-Service sshd
          Set-Service -Name sshd -StartupType 'Automatic'

          # (D) Change Default Shell to PowerShell
          New-ItemProperty -Path "HKLM:\SOFTWARE\OpenSSH" -Name DefaultShell -Value "C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe" -PropertyType String -Force

          # (E) Display Connection Info
          Write-Host "=========================================="
          Write-Host "SUCCESS! Windows SSH Server is Ready."
          Write-Host "Your Tailscale IP Address is:"
          & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Host ""
          Write-Host "Command: ssh runneradmin@<Your_IP>"
          Write-Host "Password: Aa@111111"
          Write-Host "=========================================="

      # 4. Keep Alive (6 hours)
      - name: Keep Alive
        run: Start-Sleep -Seconds 21600
