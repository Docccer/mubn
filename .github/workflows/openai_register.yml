name: OpenAI Register v4
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: D:\a\mubn\mubn
        run: |
          npm init -y
          npm install playwright@1.52.0
          npx playwright install chromium

      - name: Register OpenAI
        working-directory: D:\a\mubn\mubn
        shell: pwsh
        run: |
          $code = @'
          const { chromium } = require('playwright');
          
          (async () => {
            const browser = await chromium.launch({ 
              headless: false, 
              args: ['--no-sandbox','--disable-blink-features=AutomationControlled','--disable-dev-shm-usage'] 
            });
            const ctx = await browser.newContext({ 
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0.0.0 Safari/537.36',
              viewport: { width: 1920, height: 1080 },
              locale: 'en-US'
            });
            
            await ctx.addInitScript(() => {
              Object.defineProperty(navigator, 'webdriver', { get: () => false });
              delete navigator.__proto__.webdriver;
              window.chrome = { runtime: {}, csi: () => {}, loadTimes: () => {} };
            });
            
            const page = await ctx.newPage();
            
            // Handle popup
            ctx.on('page', async newPage => {
              console.log('[POPUP] New page detected:', newPage.url());
              await newPage.waitForLoadState('domcontentloaded');
              console.log('[POPUP] URL:', newPage.url());
              console.log('[POPUP] Title:', await newPage.title());
              await newPage.screenshot({ path: 'C:/openai_popup.png', fullPage: false });
              
              // Look for email input in popup
              const emailInput = await newPage.$('input[name="email"], input[name="username"], input[type="email"], input#email, input[name="identifier"]');
              if(emailInput) {
                console.log('[POPUP] Found email input!');
                await emailInput.fill('hxtest5adafcfa@hotmail.com');
                await newPage.waitForTimeout(1000);
                const continueBtn = await newPage.$('button[type="submit"], button:has-text("Continue")');
                if(continueBtn) {
                  console.log('[POPUP] Clicking Continue...');
                  await continueBtn.click();
                  await newPage.waitForTimeout(8000);
                  console.log('[POPUP] After continue URL:', newPage.url());
                  await newPage.screenshot({ path: 'C:/openai_popup2.png', fullPage: false });
                }
              } else {
                console.log('[POPUP] No email input found');
                const inputs = await newPage.$$eval('input', els => els.map(e => ({ name: e.name, type: e.type, id: e.id })));
                console.log('[POPUP] Inputs:', JSON.stringify(inputs));
                const bodyText = await newPage.$$eval('body *', els => els.map(e => e.textContent).filter(t => t && t.trim().length > 2 && t.trim().length < 100).map(t => t.trim()).slice(0, 20));
                console.log('[POPUP] Page text:', JSON.stringify(bodyText));
              }
            });
            
            console.log('=== Step 1: Navigate to platform.openai.com ===');
            try {
              await page.goto('https://platform.openai.com/', { waitUntil: 'domcontentloaded', timeout: 30000 });
            } catch(e) {
              console.log('Nav error:', e.message.substring(0, 100));
            }
            await page.waitForTimeout(5000);
            await page.screenshot({ path: 'C:/openai_step1.png', fullPage: false });
            console.log('URL:', page.url());
            console.log('Title:', await page.title());
            
            // Look for Sign up
            console.log('=== Looking for Sign up ===');
            const signupBtn = await page.$('a:has-text("Sign up"), a:has-text("Get started"), button:has-text("Sign up"), a[href*="signup"]');
            if(signupBtn) {
              console.log('Found Sign up, clicking...');
              try {
                await Promise.all([
                  page.waitForEvent('popup', { timeout: 10000 }).catch(() => null),
                  signupBtn.click()
                ]);
              } catch(e) {
                console.log('Click error:', e.message.substring(0, 80));
              }
              await page.waitForTimeout(5000);
              await page.screenshot({ path: 'C:/openai_step2.png', fullPage: false });
              console.log('After signup URL:', page.url());
            } else {
              console.log('No Sign up found on platform.openai.com');
              // Try direct URL
              try {
                await page.goto('https://platform.openai.com/signup', { waitUntil: 'domcontentloaded', timeout: 20000 });
              } catch(e) {}
              await page.waitForTimeout(5000);
              await page.screenshot({ path: 'C:/openai_step2.png', fullPage: false });
              console.log('Direct signup URL:', page.url());
              console.log('Direct signup Title:', await page.title());
            }
            
            // Look for email input on current page
            console.log('=== Looking for email input ===');
            const emailInput = await page.$('input[name="email"], input[name="username"], input[type="email"], input#email, input[name="identifier"]');
            if(emailInput) {
              console.log('Found email input!');
              await emailInput.fill('hxtest5adafcfa@hotmail.com');
              await page.waitForTimeout(1000);
              const continueBtn = await page.$('button[type="submit"], button:has-text("Continue"), button:has-text("Sign up")');
              if(continueBtn) {
                console.log('Clicking Continue...');
                await continueBtn.click();
                await page.waitForTimeout(8000);
                await page.screenshot({ path: 'C:/openai_step3.png', fullPage: false });
                console.log('After continue URL:', page.url());
              }
            } else {
              console.log('No email input on current page');
              const inputs = await page.$$eval('input', els => els.map(e => ({ name: e.name, type: e.type, id: e.id, placeholder: e.placeholder })));
              console.log('Inputs:', JSON.stringify(inputs));
              const bodyText = await page.$$eval('body *', els => els.map(e => e.textContent).filter(t => t && t.trim().length > 2 && t.trim().length < 100).map(t => t.trim()).slice(0, 20));
              console.log('Page text:', JSON.stringify(bodyText));
            }
            
            // Password page
            const pwdInput = await page.$('input[name="password"], input[type="password"]');
            if(pwdInput) {
              console.log('=== Password page ===');
              await pwdInput.fill('HxTest2026!@#');
              await page.waitForTimeout(1000);
              const submitBtn = await page.$('button[type="submit"], button:has-text("Continue"), button:has-text("Sign up"), button:has-text("Create")');
              if(submitBtn) {
                await submitBtn.click();
                await page.waitForTimeout(8000);
                await page.screenshot({ path: 'C:/openai_step4.png', fullPage: false });
                console.log('After password URL:', page.url());
              }
            }
            
            // Final state
            console.log('=== Final State ===');
            console.log('URL:', page.url());
            console.log('Title:', await page.title());
            await page.screenshot({ path: 'C:/openai_final.png', fullPage: false });
            
            await browser.close();
            console.log('=== DONE ===');
          })().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          '@
          Set-Content -Path "D:\a\mubn\mubn\register_openai.js" -Value $code
          node register_openai.js

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-screenshots
          path: C:/openai_*.png
