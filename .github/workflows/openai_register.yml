name: OpenAI Register v2
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: D:\a\mubn\mubn
        run: |
          npm init -y
          npm install playwright@1.52.0
          npx playwright install chromium

      - name: Register OpenAI
        working-directory: D:\a\mubn\mubn
        shell: pwsh
        run: |
          $code = @'
          const { chromium } = require('playwright');
          
          (async () => {
            const browser = await chromium.launch({ 
              headless: true, 
              args: [
                '--no-sandbox',
                '--disable-blink-features=AutomationControlled',
                '--disable-features=IsolateOrigins,site-per-process'
              ] 
            });
            const ctx = await browser.newContext({ 
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0.0.0 Safari/537.36',
              viewport: { width: 1920, height: 1080 }
            });
            
            // Anti-detection
            await ctx.addInitScript(() => {
              Object.defineProperty(navigator, 'webdriver', { get: () => false });
              Object.defineProperty(navigator, 'languages', { get: () => ['en-US', 'en'] });
              Object.defineProperty(navigator, 'platform', { get: () => 'Win32' });
              window.chrome = { runtime: {} };
            });
            
            const page = await ctx.newPage();
            
            page.on('console', msg => {
              const text = msg.text();
              if(text.includes('===') || text.includes('URL:') || text.includes('Title:') || text.includes('Found') || text.includes('Click') || text.includes('After') || text.includes('Password') || text.includes('FATAL') || text.includes('DONE') || text.includes('Error:') || text.includes('Page text'))
                console.log('[PAGE]', text);
            });
            
            // Try auth.openai.com directly
            console.log('=== Step 1: Navigate to auth.openai.com signup ===');
            try {
              await page.goto('https://auth.openai.com/u/signup/identifier', { waitUntil: 'networkidle', timeout: 30000 });
            } catch(e) {
              console.log('Nav error:', e.message.substring(0, 100));
            }
            await page.waitForTimeout(3000);
            await page.screenshot({ path: 'C:/openai_step1.png', fullPage: false });
            console.log('URL:', page.url());
            console.log('Title:', await page.title());
            
            // Check for Cloudflare
            const cfChallenge = await page.$('#challenge-running, #challenge-form, [id*="challenge"]');
            if(cfChallenge) {
              console.log('=== CLOUDFLARE CHALLENGE DETECTED ===');
              // Wait for it to resolve
              await page.waitForTimeout(15000);
              await page.screenshot({ path: 'C:/openai_cf.png', fullPage: false });
              console.log('After CF wait URL:', page.url());
            }
            
            // Look for email input
            console.log('=== Looking for email input ===');
            const emailInput = await page.$('input[name="email"], input[name="username"], input[type="email"], input#email, input[name="identifier"]');
            if(emailInput) {
              console.log('Found email input!');
              await emailInput.fill('hxtest5adafcfa@hotmail.com');
              await page.waitForTimeout(1000);
              await page.screenshot({ path: 'C:/openai_step2.png', fullPage: false });
              
              // Look for Continue
              const continueBtn = await page.$('button[type="submit"], button:has-text("Continue"), button:has-text("Sign up")');
              if(continueBtn) {
                console.log('Clicking Continue...');
                await continueBtn.click();
                await page.waitForTimeout(8000);
                await page.screenshot({ path: 'C:/openai_step3.png', fullPage: false });
                console.log('After continue URL:', page.url());
                console.log('After continue Title:', await page.title());
              }
            } else {
              console.log('No email input found on auth.openai.com');
              // Print all inputs
              const inputs = await page.$$eval('input', els => els.map(e => ({ name: e.name, type: e.type, id: e.id, placeholder: e.placeholder })));
              console.log('Inputs:', JSON.stringify(inputs));
              // Print all buttons
              const buttons = await page.$$eval('button', els => els.map(e => ({ text: e.textContent.trim().substring(0, 50), type: e.type })));
              console.log('Buttons:', JSON.stringify(buttons));
              // Print page text
              const bodyText = await page.$$eval('body *', els => els.map(e => e.textContent).filter(t => t && t.trim().length > 2).map(t => t.trim().substring(0, 80)).slice(0, 20));
              console.log('Page text:', JSON.stringify(bodyText));
            }
            
            // Password page
            const pwdInput = await page.$('input[name="password"], input[type="password"]');
            if(pwdInput) {
              console.log('=== Password page ===');
              await pwdInput.fill('HxTest2026!@#');
              await page.waitForTimeout(1000);
              const submitBtn = await page.$('button[type="submit"], button:has-text("Continue"), button:has-text("Sign up"), button:has-text("Create")');
              if(submitBtn) {
                await submitBtn.click();
                await page.waitForTimeout(8000);
                await page.screenshot({ path: 'C:/openai_step4.png', fullPage: false });
                console.log('After password URL:', page.url());
              }
            }
            
            // Verification code page
            const codeInput = await page.$('input[name="code"], input[name="otp"], input[autocomplete="one-time-code"]');
            if(codeInput) {
              console.log('=== Verification code page ===');
              await page.screenshot({ path: 'C:/openai_verify.png', fullPage: false });
            }
            
            // Birthday page
            const monthCombo = await page.$('[role="combobox"]');
            if(monthCombo) {
              console.log('=== Birthday page detected ===');
              await page.screenshot({ path: 'C:/openai_birthday.png', fullPage: false });
            }
            
            // Final state
            console.log('=== Final State ===');
            console.log('URL:', page.url());
            console.log('Title:', await page.title());
            await page.screenshot({ path: 'C:/openai_final.png', fullPage: false });
            
            // If we got redirected to ChatGPT, try API keys
            const url = page.url();
            if(url.includes('chat.openai.com') && !url.includes('auth')) {
              console.log('=== Possibly logged in! ===');
              try {
                await page.goto('https://platform.openai.com/api-keys', { waitUntil: 'domcontentloaded', timeout: 20000 });
              } catch(e) {}
              await page.waitForTimeout(5000);
              await page.screenshot({ path: 'C:/openai_apikeys.png', fullPage: false });
              console.log('API keys URL:', page.url());
            }
            
            await browser.close();
            console.log('=== DONE ===');
          })().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          '@
          Set-Content -Path "D:\a\mubn\mubn\register_openai.js" -Value $code
          node register_openai.js

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-screenshots
          path: C:/openai_*.png
