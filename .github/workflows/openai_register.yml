name: OpenAI Register v7 - API
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Register via API
        shell: pwsh
        run: |
          # First, get the auth0 signup page config
          Write-Host "=== Getting auth0 signup config ==="
          
          # Try to get the signup page directly
          $response = Invoke-WebRequest -Uri "https://auth.openai.com/u/signup/identifier" -Method GET -Headers @{
            "User-Agent" = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0.0.0 Safari/537.36"
          } -MaximumRedirection 5 -ErrorAction SilentlyContinue
          
          Write-Host "Status: $($response.StatusCode)"
          Write-Host "URL: $($response.BaseResponse.ResponseUri)"
          Write-Host "Title: $($response.Content.Substring(0, [Math]::Min(200, $response.Content.Length)))"
          
          # Extract state parameter from the page
          $stateMatch = [regex]::Match($response.Content, 'state=([^&"''\s]+)')
          if($stateMatch.Success) {
            Write-Host "State: $($stateMatch.Groups[1].Value)"
          }
          
          # Extract client_id
          $clientMatch = [regex]::Match($response.Content, 'client_id=([^&"''\s]+)')
          if($clientMatch.Success) {
            Write-Host "Client ID: $($clientMatch.Groups[1].Value)"
          }
          
          # Look for form fields
          $inputMatches = [regex]::Matches($response.Content, '<input[^>]*name="([^"]*)"[^>]*type="([^"]*)"[^>]*>')
          foreach($m in $inputMatches) {
            Write-Host "Input: name=$($m.Groups[1].Value) type=$($m.Groups[2].Value)"
          }
          
          # Look for signup form action
          $formMatch = [regex]::Match($response.Content, '<form[^>]*action="([^"]*)"[^>]*>')
          if($formMatch.Success) {
            Write-Host "Form action: $($formMatch.Groups[1].Value)"
          }
          
          # Try to find state in different format
          $stateMatch2 = [regex]::Match($response.Content, '"state":"([^"]*)"')
          if($stateMatch2.Success) {
            Write-Host "State (JSON): $($stateMatch2.Groups[1].Value)"
          }
          
          # Try to find any hidden inputs
          $hiddenMatches = [regex]::Matches($response.Content, '<input[^>]*type="hidden"[^>]*name="([^"]*)"[^>]*value="([^"]*)"')
          foreach($m in $hiddenMatches) {
            Write-Host "Hidden: name=$($m.Groups[1].Value) value=$($m.Groups[2].Value.Substring(0, [Math]::Min(50, $m.Groups[2].Value.Length)))"
          }
          
          Write-Host "=== Done ==="
