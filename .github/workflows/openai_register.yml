name: OpenAI Register v3
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: D:\a\mubn\mubn
        run: |
          npm init -y
          npm install playwright@1.52.0
          npx playwright install chromium

      - name: Register OpenAI
        working-directory: D:\a\mubn\mubn
        shell: pwsh
        run: |
          $code = @'
          const { chromium } = require('playwright');
          
          (async () => {
            const browser = await chromium.launch({ 
              headless: false, 
              args: [
                '--no-sandbox',
                '--disable-blink-features=AutomationControlled',
                '--disable-features=IsolateOrigins,site-per-process',
                '--disable-dev-shm-usage'
              ] 
            });
            const ctx = await browser.newContext({ 
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0.0.0 Safari/537.36',
              viewport: { width: 1920, height: 1080 },
              locale: 'en-US'
            });
            
            // Anti-detection
            await ctx.addInitScript(() => {
              Object.defineProperty(navigator, 'webdriver', { get: () => false });
              delete navigator.__proto__.webdriver;
              Object.defineProperty(navigator, 'languages', { get: () => ['en-US', 'en'] });
              Object.defineProperty(navigator, 'platform', { get: () => 'Win32' });
              window.chrome = { runtime: {}, csi: () => {}, loadTimes: () => {} };
              const originalQuery = window.navigator.permissions.query;
              window.navigator.permissions.query = (parameters) => (
                parameters.name === 'notifications' ?
                  Promise.resolve({ state: Notification.permission }) :
                  originalQuery(parameters)
              );
            });
            
            const page = await ctx.newPage();
            
            // Intercept auth requests
            page.on('response', async res => {
              const url = res.url();
              if(url.includes('auth0') || url.includes('/api/auth') || url.includes('authorize')) {
                console.log('[AUTH]', res.status(), url.substring(0, 150));
              }
            });
            
            console.log('=== Step 1: Navigate to ChatGPT ===');
            try {
              await page.goto('https://chatgpt.com/', { waitUntil: 'domcontentloaded', timeout: 30000 });
            } catch(e) {
              console.log('Nav error:', e.message.substring(0, 100));
            }
            await page.waitForTimeout(8000);
            await page.screenshot({ path: 'C:/openai_step1.png', fullPage: false });
            console.log('URL:', page.url());
            console.log('Title:', await page.title());
            
            // Check if we're on Cloudflare challenge
            const title = await page.title();
            if(title.includes('moment') || title.includes('challenge') || title.includes('Cloudflare')) {
              console.log('=== Cloudflare challenge - waiting longer ===');
              await page.waitForTimeout(15000);
              await page.screenshot({ path: 'C:/openai_cf.png', fullPage: false });
              console.log('After CF URL:', page.url());
              console.log('After CF Title:', await page.title());
            }
            
            // Look for Log in button
            console.log('=== Looking for Log in ===');
            const loginBtn = await page.$('button:has-text("Log in"), a:has-text("Log in"), a[href*="login"], a[href*="auth"]');
            if(loginBtn) {
              console.log('Found Log in, clicking...');
              await loginBtn.click();
              await page.waitForTimeout(8000);
              await page.screenshot({ path: 'C:/openai_step2.png', fullPage: false });
              console.log('After login URL:', page.url());
              console.log('After login Title:', await page.title());
            } else {
              console.log('No Log in button found');
              const buttons = await page.$$eval('button, a', els => els.map(e => ({ tag: e.tagName, text: (e.textContent||'').trim().substring(0, 50), href: e.href||'' })).filter(b => b.text.length > 0));
              console.log('All buttons/links:', JSON.stringify(buttons.slice(0, 20)));
            }
            
            // Now we should be on auth0 page - look for Sign up link
            console.log('=== Looking for Sign up link ===');
            const signupLink = await page.$('a:has-text("Sign up"), a[href*="signup"], button:has-text("Sign up")');
            if(signupLink) {
              console.log('Found Sign up link, clicking...');
              await signupLink.click();
              await page.waitForTimeout(5000);
              await page.screenshot({ path: 'C:/openai_step3.png', fullPage: false });
              console.log('After signup URL:', page.url());
              console.log('After signup Title:', await page.title());
            }
            
            // Look for email input
            console.log('=== Looking for email input ===');
            const emailInput = await page.$('input[name="email"], input[name="username"], input[type="email"], input#email, input[name="identifier"]');
            if(emailInput) {
              console.log('Found email input!');
              await emailInput.fill('hxtest5adafcfa@hotmail.com');
              await page.waitForTimeout(1000);
              await page.screenshot({ path: 'C:/openai_step4.png', fullPage: false });
              
              const continueBtn = await page.$('button[type="submit"], button:has-text("Continue"), button:has-text("Continue with email")');
              if(continueBtn) {
                console.log('Clicking Continue...');
                await continueBtn.click();
                await page.waitForTimeout(8000);
                await page.screenshot({ path: 'C:/openai_step5.png', fullPage: false });
                console.log('After continue URL:', page.url());
                console.log('After continue Title:', await page.title());
              }
            } else {
              console.log('No email input found');
              const inputs = await page.$$eval('input', els => els.map(e => ({ name: e.name, type: e.type, id: e.id, placeholder: e.placeholder, visible: e.offsetParent !== null })));
              console.log('Inputs:', JSON.stringify(inputs));
              const bodyText = await page.$$eval('body *', els => els.map(e => e.textContent).filter(t => t && t.trim().length > 2 && t.trim().length < 100).map(t => t.trim()).slice(0, 20));
              console.log('Page text:', JSON.stringify(bodyText));
            }
            
            // Password page
            const pwdInput = await page.$('input[name="password"], input[type="password"]');
            if(pwdInput) {
              console.log('=== Password page ===');
              await pwdInput.fill('HxTest2026!@#');
              await page.waitForTimeout(1000);
              const submitBtn = await page.$('button[type="submit"], button:has-text("Continue"), button:has-text("Sign up"), button:has-text("Create")');
              if(submitBtn) {
                await submitBtn.click();
                await page.waitForTimeout(8000);
                await page.screenshot({ path: 'C:/openai_step6.png', fullPage: false });
                console.log('After password URL:', page.url());
              }
            }
            
            // Verification code page
            const codeInput = await page.$('input[name="code"], input[name="otp"], input[autocomplete="one-time-code"]');
            if(codeInput) {
              console.log('=== Verification code page ===');
              await page.screenshot({ path: 'C:/openai_verify.png', fullPage: false });
            }
            
            // Final state
            console.log('=== Final State ===');
            console.log('URL:', page.url());
            console.log('Title:', await page.title());
            await page.screenshot({ path: 'C:/openai_final.png', fullPage: false });
            
            await browser.close();
            console.log('=== DONE ===');
          })().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          '@
          Set-Content -Path "D:\a\mubn\mubn\register_openai.js" -Value $code
          node register_openai.js

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-screenshots
          path: C:/openai_*.png
