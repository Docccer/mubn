name: OpenAI Register v5
on:
  workflow_dispatch:

jobs:
  register:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: D:\a\mubn\mubn
        run: |
          npm init -y
          npm install playwright@1.52.0
          npx playwright install chromium

      - name: Register OpenAI
        working-directory: D:\a\mubn\mubn
        shell: pwsh
        run: |
          $code = @'
          const { chromium } = require('playwright');
          
          (async () => {
            const browser = await chromium.launch({ 
              headless: false, 
              args: ['--no-sandbox','--disable-blink-features=AutomationControlled','--disable-dev-shm-usage'] 
            });
            const ctx = await browser.newContext({ 
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0.0.0 Safari/537.36',
              viewport: { width: 1920, height: 1080 },
              locale: 'en-US'
            });
            
            await ctx.addInitScript(() => {
              Object.defineProperty(navigator, 'webdriver', { get: () => false });
              delete navigator.__proto__.webdriver;
              window.chrome = { runtime: {}, csi: () => {}, loadTimes: () => {} };
            });
            
            const page = await ctx.newPage();
            
            // Handle popup - capture auth0 signup
            ctx.on('page', async newPage => {
              const url = newPage.url();
              console.log('[POPUP] New page:', url.substring(0, 120));
              await newPage.waitForLoadState('domcontentloaded');
              await newPage.waitForTimeout(3000);
              const popupUrl = newPage.url();
              const popupTitle = await newPage.title();
              console.log('[POPUP] URL:', popupUrl);
              console.log('[POPUP] Title:', popupTitle);
              await newPage.screenshot({ path: 'C:/openai_popup.png', fullPage: false });
              
              // If this is auth0 signup page
              if(popupUrl.includes('auth.openai.com')) {
                // Look for Sign up link
                const signupLink = await newPage.$('a:has-text("Sign up")');
                if(signupLink) {
                  console.log('[POPUP] Found Sign up link, clicking...');
                  await signupLink.click();
                  await newPage.waitForTimeout(5000);
                  console.log('[POPUP] After signup URL:', newPage.url());
                  await newPage.screenshot({ path: 'C:/openai_popup_signup.png', fullPage: false });
                }
                
                // Look for email input
                const emailInput = await newPage.$('input[name="email"], input[name="username"], input[type="email"], input#email, input[name="identifier"]');
                if(emailInput) {
                  console.log('[POPUP] Found email input!');
                  await emailInput.fill('hxtest5adafcfa@hotmail.com');
                  await newPage.waitForTimeout(1000);
                  const continueBtn = await newPage.$('button[type="submit"], button:has-text("Continue")');
                  if(continueBtn) {
                    console.log('[POPUP] Clicking Continue...');
                    await continueBtn.click();
                    await newPage.waitForTimeout(8000);
                    console.log('[POPUP] After continue URL:', newPage.url());
                    await newPage.screenshot({ path: 'C:/openai_popup2.png', fullPage: false });
                    
                    // Password
                    const pwdInput = await newPage.$('input[name="password"], input[type="password"]');
                    if(pwdInput) {
                      console.log('[POPUP] Password page!');
                      await pwdInput.fill('HxTest2026!@#');
                      await newPage.waitForTimeout(1000);
                      const submitBtn = await newPage.$('button[type="submit"], button:has-text("Continue"), button:has-text("Sign up")');
                      if(submitBtn) {
                        await submitBtn.click();
                        await newPage.waitForTimeout(8000);
                        console.log('[POPUP] After password URL:', newPage.url());
                        await newPage.screenshot({ path: 'C:/openai_popup3.png', fullPage: false });
                      }
                    }
                  }
                } else {
                  console.log('[POPUP] No email input found');
                  const inputs = await newPage.$$eval('input', els => els.map(e => ({ name: e.name, type: e.type, id: e.id, placeholder: e.placeholder })));
                  console.log('[POPUP] Inputs:', JSON.stringify(inputs));
                  const bodyText = await newPage.$$eval('body *', els => els.map(e => e.textContent).filter(t => t && t.trim().length > 2 && t.trim().length < 100).map(t => t.trim()).slice(0, 20));
                  console.log('[POPUP] Page text:', JSON.stringify(bodyText));
                }
              }
            });
            
            // Go to chatgpt.com and click Log in
            console.log('=== Step 1: Navigate to ChatGPT ===');
            try {
              await page.goto('https://chatgpt.com/', { waitUntil: 'domcontentloaded', timeout: 30000 });
            } catch(e) {
              console.log('Nav error:', e.message.substring(0, 100));
            }
            await page.waitForTimeout(5000);
            console.log('URL:', page.url());
            console.log('Title:', await page.title());
            
            // Click Log in
            const loginBtn = await page.$('button:has-text("Log in")');
            if(loginBtn) {
              console.log('Found Log in, clicking...');
              await loginBtn.click({ timeout: 5000 });
              console.log('Clicked Log in');
              await page.waitForTimeout(10000);
            }
            
            // Final state
            console.log('=== Final State ===');
            console.log('URL:', page.url());
            console.log('Title:', await page.title());
            await page.screenshot({ path: 'C:/openai_final.png', fullPage: false });
            
            await browser.close();
            console.log('=== DONE ===');
          })().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          '@
          Set-Content -Path "D:\a\mubn\mubn\register_openai.js" -Value $code
          node register_openai.js

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-screenshots
          path: C:/openai_*.png
